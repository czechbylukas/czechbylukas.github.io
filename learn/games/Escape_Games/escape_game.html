        updateUI();
        document.getElementById('location-txt').innerHTML = `${wt('location')}: ${wt('introLoc')}`;
        document.getElementById('scene').innerHTML = `
            <img src="${IMG_PATH}Temny_les_uvod.jpg" class="monster-img" alt="Intro">
            <h1 style="font-size: 1.5em; margin: 5px 0;">${wt('introTitle')}</h1>
            <div class="main-desc">
                <p>${wt('intro1')}</p>
                <p>${wt('intro2')}</p>
                <p>${wt('intro3')}</p>
            </div>
            <p style="color: var(--secondary); font-style: italic; font-size: 0.8em; margin: 5px 0;">${wt('introSub')}</p>
            <button class="choice-btn" onclick="startLevel(1)">${wt('enterBtn')}</button>
        `;
    }

    async function startLevel(levelNum) {
    currentLevel = levelNum;


    // TRACKING: This will now work because gtag is loaded via your header script!
    if (typeof gtag === 'function') {
        gtag('event', 'level_start', {
            'level_name': 'Monster_' + levelNum,
            'game_name': 'Hunter_Princess'
        });
    }


    
    // Check if player has finished all standard monster levels
    if (levelNum > monsters.length) { 
        if (isInjured && !inRevengeMode) {
            startRevenge();
        } else {
            winGame();
        }
        return; 
    }

    const m = monsters[levelNum - 1];
    const scene = document.getElementById('scene');
    
    // Display loading state while we talk to the DB and API
    scene.innerHTML = `<div class="loader">${wt('loading')} ${m.name}...</div>`;
    
    try {
        // 1. Get the random word directly from czech_master.db (Column C='noun', Column D='A1')
        const wordData = await getRandomA1Word();
        const word = wordData.cz;
        const wordEn = wordData.en;

        // 2. Critical check: If DB returns nothing, stop and show error (No fallbacks!)
        if (!word) {
            scene.innerHTML = `
                <div class="status-box" style="border-left: 5px solid var(--danger);">
                    <h2 style="color: var(--danger);">Database Error</h2>
                    <p>Slovo nebylo nalezeno v databázi (Level: A1, Typ: noun).</p>
                </div>`;
            return;
        }

        // 3. Send that specific word to your Python API to get declension forms
        const { correctForms, options } = await getWordForms(word, m.pad);
        

        
        // 4. Update UI labels
        updateUI();
        document.getElementById('location-txt').innerHTML = inRevengeMode 
            ? `${wt('revengeLoc')}: ${m.name}` 
            : `${wt('monst')}: ${m.name}`;
        
        // 5. Render the battle scene
        scene.innerHTML = `
            <img src="${IMG_PATH}${m.img}" class="monster-img" alt="${m.name}" onerror="this.src='${IMG_PATH}Temny_les_uvod.jpg'">
            <div class="owl-dialog">
                <img src="${IMG_PATH}Moudra_sova_Slovnice.png" class="owl-img" alt="Owl" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3503/3503831.png'">
                <div class="owl-speech">
                    <p><strong>${wt('owlName')}:</strong></p>
                    <p>"<span class="tr-text" onmouseover="showT('${m.owlAsk.en}')" onmouseout="hideT()">${m.owlAsk.cs}</span>"</p>
                    <p style="color: #8bc34a; font-size: 0.8em;">${wt('hintLabel')}: <span class="tr-text" onmouseover="showT('${m.hint.en.replace(/'/g, "\\'")}')" onmouseout="hideT()">${m.hint.cs}</span></p>
                </div>
            </div>
            <p style="margin: 10px 0; font-size: 1em; display: flex; align-items: center; justify-content: center; gap: 10px;">
                <span style="background: var(--accent); color: black; padding: 2px 8px; border-radius: 5px; font-weight: bold; font-size: 0.9em;">
                    ${m.pad}. pád
                </span>
                
                <span>${wt('prompt')}</span>
                
                <strong class="tr-text" 
                        onmouseover="showT('${wordEn.replace(/'/g, "\\'")}')" 
                        onmouseout="hideT()" 
                        style="color: #ffeb3b; cursor: help; border-bottom: 2px dashed #ffeb3b; font-size: 1.2em;">
                    ${word.toUpperCase()}
                </strong>:
            </p>


            <div id="btn-container"></div>
        `;

        // 6. Create and Filter Options
        // Step A: Clean and de-duplicate
        let uniqueOptions = [...new Set(options.map(opt => {
            const parts = opt.trim().split(' ');
            return parts[parts.length - 1].toLowerCase();
        }))];

        // Step B: If we don't have 3, create "Grammar-like" distractors
        // Instead of picking 'Postel', we try to modify the original word's ending
        const root = word.toLowerCase().slice(0, -1); // 'galeri' from 'galerie'
        const fakeEndings = ['í', 'i', 'ou', 'y', 'e', 'u', 'em'];

        for (let end of fakeEndings) {
            if (uniqueOptions.length >= 3) break;
            const fakeWord = root + end;
            if (!uniqueOptions.includes(fakeWord)) {
                uniqueOptions.push(fakeWord);
            }
        }

        // Step C: If we still have more than 3, keep the correct one and trim
        const correctNoun = correctForms[0].split(' ').pop().toLowerCase();
        if (uniqueOptions.length > 3) {
            let filtered = uniqueOptions.filter(o => o !== correctNoun);
            // Shuffle distractors so we don't always get the same fake endings
            filtered.sort(() => Math.random() - 0.5);
            uniqueOptions = [correctNoun, filtered[0], filtered[1]];
        }

        // Step D: Shuffle so the correct answer isn't always in the same spot
        uniqueOptions.sort(() => Math.random() - 0.5);

        // Step E: Render Buttons
        const btnContainer = document.getElementById('btn-container');
        btnContainer.innerHTML = ''; // Clear previous

        uniqueOptions.forEach(cleanOpt => {
            const b = document.createElement('button');
            b.className = "choice-btn";
            b.innerText = cleanOpt;
            
            b.onclick = () => {
                const isCorrect = correctForms.some(correct => {
                    const cParts = correct.trim().split(' ');
                    return cParts[cParts.length - 1].toLowerCase() === cleanOpt;
                });
                handleAnswer(isCorrect);
            };
            btnContainer.appendChild(b);
        });

    } catch (error) {
        console.error("Failed to start level:", error);
        scene.innerHTML = `<div class="status-box">Chyba při komunikaci s databází nebo API.</div>`;
    }
}

    function handleAnswer(isCorrect) {
        // Identify which monster is attacking
        const m = inRevengeMode ? monsters[failedMonsterIndex] : monsters[currentLevel - 1];
        const scene = document.getElementById('scene');
        
        if (isCorrect) {
            // WIN LOGIC
            if (inRevengeMode) { winGame(); return; }
            scene.innerHTML = `
                <div class="status-box" style="border-left: 5px solid var(--accent);">
                    <h2 style="color: var(--accent); margin-top:0; font-size: 1.3em;">${wt('victory')}</h2>
                    <p style="margin: 5px 0;"><span class="tr-text" onmouseover="showT('${m.winMsg.en.replace(/'/g, "\\'")}')" onmouseout="hideT()">${m.winMsg.cs}</span></p>
                ${m.grammarLink ? `<div style="margin-top: 10px; border-top: 1px dashed #555; padding-top: 10px; display: flex; align-items: center; gap: 15px;">
                    <img src="${IMG_PATH}Moudra_sova_Slovnice.png" style="width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--accent);">
                    <div>
                        <p style="font-size: 0.85em; font-style: italic; color: #ccc; margin: 0;">${wt('sovaNote')}</p>
                        <a href="${m.grammarLink}" target="_blank" class="choice-btn" style="background: #2c3e50; font-size: 13px; width: auto; display: inline-block; padding: 5px 10px; margin-top: 5px;">📄 ${wt('cheatSheet')}</a>
                    </div>
                </div>` : ""}
                </div>
            <button class="choice-btn" onclick="startLevel(currentLevel + 1)">${wt('continue')}</button>
        `;
        
        } else {
            // LOSS LOGIC
            // Check for DEATH (Second loss OR Revenge loss)
            if (isInjured || inRevengeMode) {
                // REMOVED m.injury.cs here to meet your requirement
                const deathMsgCs = "Zemřel jsi!";
                const deathMsgEn = "You died!";
                gameOver(deathMsgCs, deathMsgEn);
            } 
            // Check for FIRST INJURY
            else {
                isInjured = true;
                failedMonsterIndex = currentLevel - 1;
                scene.innerHTML = `
                    <div class="status-box" style="border-left: 5px solid var(--danger);">
                        <h2 style="color: var(--danger);">${wt('injuryTitle')}</h2>
                        <p><span class="tr-text" onmouseover="showT('${m.injury.en.replace(/'/g, "\\'")}')" onmouseout="hideT()">${m.injury.cs}</span></p>
                    </div>
                    <button class="choice-btn" onclick="startLevel(currentLevel + 1)">${wt('injuryBtn')}</button>
                `;
            }
        }
        updateUI();
    }

    function startRevenge() {
        inRevengeMode = true;
        const m = monsters[failedMonsterIndex];
        document.getElementById('scene').innerHTML = `
            <div class="status-box" style="border-left: 5px solid var(--danger);">
                <h2 style="color: var(--danger);">${wt('revengeTitle')}</h2>
                <p>${translations.cs.revengeDesc.replace('{name}', m.name)}</p>
                <p>${wt('revengeSub')}</p>
            </div>
            <button class="choice-btn" onclick="startLevel(failedMonsterIndex + 1)">${wt('revengeBtn')}</button>
        `;
    }

    function gameOver(msgCs, msgEn) {
        document.getElementById('scene').innerHTML = `
            <div class="status-box" style="border-left: 5px solid var(--danger);">
                <h1 style="color: var(--danger); font-size: 1.5em;">${wt('gameOverTitle')}</h1>
                <p><span class="tr-text" onmouseover="showT('${msgEn.replace(/'/g, "\\'")}')" onmouseout="hideT()">${msgCs}</span></p>
                <p>${wt('gameOverDesc')}</p>
            </div>
            <button class="choice-btn" onclick="location.reload()">${wt('tryAgain')}</button>
        `;
    }

    function winGame() {
        document.getElementById('scene').innerHTML = `
            <img src="${IMG_PATH}Princezna_Deklinace.png" class="monster-img" alt="Princess">
            <h1 style="font-size: 1.5em;">${wt('winTitle')}</h1>
            <div class="status-box">
                <p>${wt('winDesc')}</p>
                <p style="text-align: left; font-size: 0.95em; line-height: 1.6;">
                    Krásn<strong>á</strong> princezn<strong>a</strong> (1p) ze zaklet<strong>ého</strong> hrad<strong>u</strong> (2p) je svému statn<strong>ému</strong> zachránc<strong>i</strong> (3p) vděčná za svů<strong>j</strong> živo<strong>t</strong> (4p): 
                    <span style="color: #ff4081; font-style: italic; display: block; margin-top: 10px; text-align: center; font-size: 1.1em;">
                        “Zachrán<strong>če</strong> (5p) můj! Snila jsem o tob<strong>ě</strong> (6p) dlouho. Chci se s teb<strong>ou</strong> (7p) oženit.” ❤️<img src="https://upload.wikimedia.org/wikipedia/commons/c/cb/Flag_of_the_Czech_Republic.svg" style="width: 24px; vertical-align: middle; margin-left: 5px; border: 1px solid #555; border-radius: 2px;" alt="CZ Flag">
</span>
                </p>
            </div>
            <button class="choice-btn" onclick="location.reload()">${wt('playAgain')}</button>
        `;
    }

    let dbInstance = null;


    async function getRandomA1Word() {
    try {
        if (!dbInstance) {
            const SQL = await initSqlJs({
                locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/${file}`
            });
            
            const dbPath = '/VocabSQL_database/czech_master.db';
            const res = await fetch(dbPath);
            if (!res.ok) throw new Error("Could not find database file.");
            
            const buf = await res.arrayBuffer();
            dbInstance = new SQL.Database(new Uint8Array(buf));
            console.log("DB Loaded Successfully!");

            // DEBUG: Let's see the column names of the 'words' table
            const structure = dbInstance.exec("PRAGMA table_info(words);");
            console.log("Columns in 'words' table:", structure[0].values.map(col => col[1]));
        }

        // We use '*' first to grab everything, then we will pick the right column
        const result = dbInstance.exec("SELECT * FROM words WHERE level = 'A1' AND pos = 'noun' ORDER BY RANDOM() LIMIT 1");
        
        if (result && result.length > 0 && result[0].values.length > 0) {
            // result[0].columns tells us the order. Let's find the one that isn't 'pos' or 'level'
            const cols = result[0].columns;
            const row = result[0].values[0];
            
            // Log the result so you can see the data
            console.log("Found Row:", row);
            console.log("Column Names:", cols);

            // Traditionally, the word is in the first column (index 0) or called 'czech'
            // I'll try to find the word by excluding 'pos', 'level', and 'id'
            let wordIndex = cols.findIndex(c => !['id', 'pos', 'level', 'type'].includes(c.toLowerCase()));
            if (wordIndex === -1) wordIndex = 0; // Fallback to first column

            const pickedWord = row[wordIndex];
            // Najdeme index pro překlad (trans_en)
            let enIndex = cols.findIndex(c => c.toLowerCase() === 'trans_en');
            const translation = enIndex !== -1 ? row[enIndex] : "???";

            console.log("Picked Word:", pickedWord, "Translation:", translation);

            // Vracíme objekt s oběma hodnotami
            return { cz: pickedWord, en: translation };
            
        } else {
            console.error("No results found for A1 nouns.");
            return null;
        }
    } catch (e) {
        console.error("SQL Error:", e);
        return null;
    }
}

    function cleanResult(text) {
        if (!text) return [];
        const excludedWords = ["o", "v", "na", "u", "za", "před", "pod", "nad", "mezi", "s", "se", "k", "ke", "od", "do", "z", "ze", "pro", "při", "po", "kolem", "bez", "kvůli", "proti", "naproti", "díky", "blízko", "uprostřed", "vedle", "místo", "podle", "kromě", "skrz", "ve", "včetně", "oslovujeme", "voláme"];
        let rawForms = text.split(/[/,]/);
        let forms = rawForms.map(s => {
            let clean = s.trim().toLowerCase().replace(/[.,!:]/g, "");
            let words = clean.split(/\s+/);
            return words.filter(w => !excludedWords.includes(w)).join(" ");
        });
        return [...new Set(forms.filter(f => f.length > 0))];
    }

    async function getWordForms(word, targetPad) {
        // This function calls your Python API to decline the word found above
        const fetchSingle = async (p) => {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    mode: 'noun', 
                    word: word, 
                    case: p.toString(), 
                    number: 'S' 
                })
            });
            const data = await res.json();
            // Helper to clean array results from Python
            return Array.isArray(data.result) ? data.result.map(s => s.toLowerCase()) : [data.result.toLowerCase()];
        };

        const correctForms = await fetchSingle(targetPad);
        
        // Generate wrong options for the buttons
        let wrongs = new Set();
        let otherPady = ["1", "2", "3", "4", "5", "6", "7"].filter(p => p !== targetPad.toString());
        
        for (let p of otherPady) {
            if (wrongs.size >= 2) break;
            const wForms = await fetchSingle(p);
            wForms.forEach(f => {
                if (!correctForms.includes(f) && wrongs.size < 2) wrongs.add(f);
            });
        }

        const options = [correctForms[0], ...Array.from(wrongs)];
        return { 
            correctForms, 
            options: options.sort(() => Math.random() - 0.5) 
        };
    }

    async function getWordFormsWithTranslation(word, targetPad) {
    let translation = "Czech word";
    try {
        const resTr = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ mode: 'dictionary', word: word })
        });
        const dataTr = await resTr.json();
        translation = dataTr.result ? (dataTr.result.split('=')[1] || dataTr.result) : "translation";
    } catch (e) { translation = "translation"; }

    const { correctForms, options } = await getWordForms(word, targetPad);
    return { word, correctForms, options, translation: translation.trim() };
}


    showIntro();
