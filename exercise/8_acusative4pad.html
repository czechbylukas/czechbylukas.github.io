<script>
  // Load footer.html dynamically

    .then(response => response.text())

      document.getElementById("footer-placeholder").innerHTML = data;
    })
    .catch(error => console.error("Error loading footer:", error));
</script>



<script>
  async function initDatabase() {
    try {
      const sqlPromise = initSqlJs({ locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/${file}` });
      const dataPromise = fetch("../VocabSQL_database/czech_master.db").then(res => res.arrayBuffer());
      const [SQL, buf] = await Promise.all([sqlPromise, dataPromise]);
      const db = new SQL.Database(new Uint8Array(buf));

      // Updated query for Locative Case
      const query = "SELECT lemma, trans_en, trans_de, trans_es FROM words WHERE level = 'A1' AND lesson = '007 Akuzativ / 4. pád'";
      const results = db.exec(query);

      if (results.length > 0) {
        window.vocab = results[0].values.map(row => ({
          czech: row[0],
          english: row[1],
          german: row[2],
          spanish: row[3]
        }));
      }

      // Trigger the practice logic
      if (typeof initPractice === "function") initPractice();
      else if (typeof renderCard === "function") renderCard();
    } catch (err) { console.error("Database error:", err); }
  }
  initDatabase();
</script>

<!-- Translations -->

<script>
  document.addEventListener("DOMContentLoaded", () => {
    const savedLang = localStorage.getItem("selectedLanguage") || "en";
    
    // 1. Load the translation JSON file
    if (typeof loadTranslations === "function") {
      loadTranslations(savedLang);
    }
  });

  // 2. This handles the flag clicks without changing the Page Title
  document.addEventListener("languageChanged", () => {
    // This updates the Menu and Buttons (Home, Next, Prev)
    if (typeof applyTranslations === "function") {
      applyTranslations();
    }
    
    // 3. This updates the Flashcards immediately
    if (typeof showCurrentCard === "function") {
      showCurrentCard();
    }
  });
</script>
