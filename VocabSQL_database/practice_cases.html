<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Czech Master Pro - Wiktionary Edition</title>
    <style>
        :root { 
            --primary: #2c3e50; --accent: #d32f2f; --bg: #f4f7f6; --success: #27ae60; --warning: #f39c12; 
            --m-ani: #bbdefb; --m-ani-t: #0d47a1; --m-ina: #e3f2fd; --m-ina-t: #1565c0;
            --f: #fce4ec; --f-t: #c2185b; --n: #e8f5e9; --n-t: #1b5e20;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .game-card { background: white; width: 100%; max-width: 600px; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; border-top: 8px solid var(--primary); }
        .level-tag { background: #eee; padding: 6px 15px; border-radius: 20px; font-size: 0.9rem; font-weight: bold; color: var(--primary); margin-bottom: 20px; display: inline-block; }
        .word-box { font-size: 2.5rem; font-weight: bold; color: var(--accent); margin: 15px 0; }
        
        /* BIG CASE TEXT FIX */
        .case-highlight { font-size: 2.2rem; display: block; color: var(--primary); font-weight: 800; margin: 10px 0; text-transform: uppercase; letter-spacing: 2px; }
        
        .sentence-box { background: #fffbe6; padding: 20px; border: 2px dashed #ffe58f; border-radius: 10px; margin: 20px 0; font-size: 1.3rem; color: #333; }
        input { width: 80%; padding: 15px; font-size: 1.2rem; border: 2px solid #ddd; border-radius: 8px; outline: none; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        button { padding: 15px; border: none; border-radius: 8px; background: var(--primary); color: white; cursor: pointer; font-size: 1.1rem; font-weight: bold; }
        .btn-gender span { display: block; font-size: 0.75rem; font-weight: normal; opacity: 0.9; margin-top: 4px; }
        .m-ani { background: var(--m-ani) !important; color: var(--m-ani-t) !important; }
        .m-ina { background: var(--m-ina) !important; color: var(--m-ina-t) !important; }
        .fem { background: var(--f) !important; color: var(--f-t) !important; }
        .neu { background: var(--n) !important; color: var(--n-t) !important; }
        .feedback { min-height: 35px; margin-top: 15px; font-weight: bold; font-size: 1.1rem; }
        .hidden { display: none !important; }
        .loading-shield { font-style: italic; color: #999; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="game-card">
    <div id="level-indicator" class="level-tag">LEVEL 1</div>
    <div id="prompt" style="color: #666;">...</div>
    <div id="target-display" class="word-box">---</div>
    <div id="loading" class="loading-shield hidden">Fetching live forms from Wiktionary...</div>
    <div id="sentence-container" class="sentence-box hidden"></div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="Type answer..." autocomplete="off">
    </div>

    <div id="gender-area" class="btn-grid hidden">
        <button class="btn-gender m-ani" onclick="checkGender('pán')">Masc. (Ani)<span>pán / muž</span></button>
        <button class="btn-gender m-ina" onclick="checkGender('hrad')">Masc. (Ina)<span>hrad / stroj</span></button>
        <button class="btn-gender fem" onclick="checkGender('žena')">Feminine<span>žena / růže</span></button>
        <button class="btn-gender neu" onclick="checkGender('město')">Neuter<span>město / moře</span></button>
    </div>

    <button id="main-submit" style="margin-top: 20px; width: 85%;" onclick="handleLogic()">Submit Answer</button>
    <div id="feedback" class="feedback"></div>
</div>

<script src="sentences.js"></script>
<script>
// Logic to map internal case names to Wiktionary table indices
const caseMap = {
    "Genitiv": 1, "Dativ": 2, "Akuzativ": 3, "Vokativ": 4, "Lokál": 5, "Instrumentál": 6
};

const rawData = `kouč,muž,coach
stůl,hrad,table
pes,pán,dog
škola,žena,school
auto,město,car`; // Add your 300 words here

const vocabulary = rawData.split('\n').map(line => {
    const parts = line.split(',');
    return { cz: parts[0], pattern: parts[1], en: parts[2] };
});

let currentWord = {};
let currentLevel = 1;
let wikiForms = null;
let currentCaseName = "";
let attempts = 0;

async function fetchWikiForms(word) {
    document.getElementById('loading').classList.remove('hidden');
    try {
        const response = await fetch(`https://en.wiktionary.org/api/rest_v1/page/html/${encodeURIComponent(word)}`);
        const html = await response.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, "text/html");
        
        // Find the Czech declension table
        const table = doc.querySelector('.inflection-table-res'); 
        const rows = table.querySelectorAll('tr');
        
        let forms = {};
        // Scrape Singular forms (usually in the second column)
        Object.keys(caseMap).forEach(key => {
            const rowIndex = caseMap[key] + 1; // skipping header
            const cell = rows[rowIndex].querySelectorAll('td')[0];
            // Split by comma in case of multiple forms like "kouči, koučovi"
            forms[key] = cell.innerText.trim().split(/,\s+/).map(s => s.toLowerCase());
        });
        
        wikiForms = forms;
        console.log("Wiktionary Data Loaded:", wikiForms);
    } catch (e) {
        console.error("Wiki error, using fallback logic");
        wikiForms = null; 
    }
    document.getElementById('loading').classList.add('hidden');
}

async function nextWord() {
    currentWord = vocabulary[Math.floor(Math.random() * vocabulary.length)];
    await fetchWikiForms(currentWord.cz);
    currentLevel = 1;
    attempts = 0;
    showLevel1();
}

function showLevel1() {
    updateUI("LEVEL 1", `Translate to Czech:`, currentWord.en, 'input');
}

function showLevel2() {
    updateUI("LEVEL 2", "Select the pattern:", currentWord.cz, 'gender');
}

function showLevel3() {
    const keys = Object.keys(caseMap);
    currentCaseName = keys[Math.floor(Math.random() * keys.length)];
    // MAKE THE CASE TEXT BIG
    const bigPrompt = `<span class="case-highlight">${currentCaseName}</span>`;
    updateUI("LEVEL 3", bigPrompt, currentWord.cz, 'input');
}

function showLevel4() {
    // Only pull from sentences.js
    const options = (typeof sentenceDb !== 'undefined') ? sentenceDb.filter(s => s.word === currentWord.cz) : [];
    const activeS = options[Math.floor(Math.random() * options.length)];
    
    updateUI("LEVEL 4", "Complete the context sentence:", "", 'input');
    const sc = document.getElementById('sentence-container');
    sc.innerText = activeS ? activeS.text : "Sentences for this word not found in JS file.";
    sc.classList.remove('hidden');
    document.getElementById('target-display').innerText = currentWord.cz;
    currentWord.lvl4Answer = activeS ? activeS.correctForm : "";
}

function handleLogic() {
    const val = document.getElementById('user-input').value.trim().toLowerCase();
    let correct = false;
    let expectedText = "";

    if (currentLevel === 1) {
        correct = (val === currentWord.cz.toLowerCase());
        expectedText = currentWord.cz;
    } else if (currentLevel === 3) {
        if (wikiForms && wikiForms[currentCaseName]) {
            correct = wikiForms[currentCaseName].includes(val);
            expectedText = wikiForms[currentCaseName].join(" / ");
        } else { correct = true; } // Safety skip
    } else if (currentLevel === 4) {
        correct = (val === currentWord.lvl4Answer.toLowerCase());
        expectedText = currentWord.lvl4Answer;
    }

    if (correct) win();
    else {
        attempts++;
        if (attempts >= 3) {
            lose(`Wrong! Answer: ${expectedText.toUpperCase()}`);
            setTimeout(win, 2000);
        } else {
            lose(`Try again! (${3-attempts} left)`);
        }
    }
}

function checkGender(choice) {
    // Basic mapping for the 4 buttons
    const map = { 'muž':'pán', 'stroj':'hrad', 'píseň':'žena', 'kost':'žena', 'růže':'žena', 'moře':'město', 'stavení':'město', 'kuře':'město', 'předseda':'pán' };
    const target = map[currentWord.pattern] || currentWord.pattern;
    if (choice === target) win();
    else {
        attempts++;
        if (attempts >= 3) { lose(`It is ${currentWord.pattern}`); setTimeout(win, 2000); }
        else lose("Wrong pattern!");
    }
}

function win() {
    const fb = document.getElementById('feedback');
    fb.innerText = "✓ Correct!"; fb.style.color = "var(--success)";
    currentLevel++; attempts = 0;
    setTimeout(() => {
        fb.innerText = "";
        document.getElementById('user-input').value = "";
        document.getElementById('sentence-container').classList.add('hidden');
        if (currentLevel === 2) showLevel2();
        else if (currentLevel === 3) showLevel3();
        else if (currentLevel === 4) showLevel4();
        else nextWord();
    }, 1000);
}

function lose(msg) {
    const fb = document.getElementById('feedback');
    fb.innerText = msg;
    fb.style.color = (attempts >= 3) ? "var(--accent)" : "var(--warning)";
}

function updateUI(level, prompt, display, mode) {
    document.getElementById('level-indicator').innerText = level;
    document.getElementById('prompt').innerHTML = prompt; // Using innerHTML for big text
    document.getElementById('target-display').innerText = display;
    document.getElementById('input-area').classList.toggle('hidden', mode !== 'input');
    document.getElementById('main-submit').classList.toggle('hidden', mode !== 'input');
    document.getElementById('gender-area').classList.toggle('hidden', mode !== 'gender');
}

document.getElementById('user-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') handleLogic(); });

nextWord();
</script>
</body>
</html>
