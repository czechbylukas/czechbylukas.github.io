<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Czech Master Pro</title>
    <style>
        :root { 
            --primary: #2c3e50; --accent: #d32f2f; --bg: #f4f7f6; --success: #27ae60;
            --m-ani: #2196f3; --m-ina: #64b5f6; --fem: #ec407a; --neu: #66bb6a;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .game-card { background: white; width: 100%; max-width: 600px; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; border-top: 10px solid var(--primary); }
        .level-tag { background: #eee; padding: 8px 20px; border-radius: 25px; font-size: 0.9rem; font-weight: 800; color: var(--primary); margin-bottom: 20px; display: inline-block; }
        .word-box { font-size: 2.8rem; font-weight: bold; color: var(--accent); margin: 20px 0; min-height: 70px; display: flex; align-items: center; justify-content: center; }
        .case-highlight { font-size: 1.8rem; display: block; color: var(--primary); font-weight: 800; margin: 10px 0; text-transform: uppercase; }
        .sentence-box { background: #fffde6; padding: 25px; border: 2px dashed #ffe58f; border-radius: 12px; margin: 20px 0; font-size: 1.4rem; }
        
        input { width: 85%; padding: 18px; font-size: 1.3rem; border: 2px solid #ddd; border-radius: 12px; outline: none; text-align: center; }
        input:focus { border-color: var(--primary); }

        /* Modernized Gender Buttons */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .gender-btn { padding: 20px; border: none; border-radius: 12px; color: white; cursor: pointer; font-size: 1.1rem; font-weight: bold; transition: 0.2s; }
        .gender-btn:active { transform: scale(0.95); }
        .gender-btn span { display: block; font-size: 0.75rem; font-weight: normal; opacity: 0.9; margin-top: 5px; }
        
        .btn-masc-anim { background-color: var(--m-ani); }
        .btn-masc-inan { background-color: var(--m-ina); }
        .btn-fem { background-color: var(--fem); }
        .btn-neu { background-color: var(--neu); }

        #main-submit { margin-top: 25px; width: 95%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 1.2rem; cursor: pointer; }
        #main-submit:disabled { background: #ccc; cursor: not-allowed; }
        .feedback { min-height: 40px; margin-top: 20px; font-weight: bold; font-size: 1.2rem; }
        .hidden { display: none !important; }
        #status-msg { font-size: 0.8rem; color: #999; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="game-card">

    
    <div id="level-indicator" class="level-tag">LEVEL 1</div>
    <div id="status-msg">Načítám...</div>
    <div id="prompt" style="color: #666;">...</div>


<div id="settings-area" style="margin: 10px 0; font-size: 0.9rem; color: #64748b;">
    <label><input type="checkbox" id="use-singular" checked> Jednotné (Sg)</label>
    <label style="margin-left: 15px;"><input type="checkbox" id="use-plural"> Množné (Pl)</label>
</div>


    <div id="target-display" class="word-box">---</div>


    
    
    <div id="sentence-container" class="sentence-box hidden"></div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="Napište odpověď..." autocomplete="off">
    </div>





    <div id="gender-area" class="btn-grid hidden">
        <button class="gender-btn btn-masc-anim" onclick="checkGender('masc_anim')">MASC. ANIMATE<span>pán / muž / předseda/ soudce</span></button>
        <button class="gender-btn btn-masc-inan" onclick="checkGender('masc_inan')">MASC. INANIMATE<span>hrad / stroj</span></button>
        <button class="gender-btn btn-fem" onclick="checkGender('fem')">FEMININE<span>žena / růže / píseň / kost</span></button>
        <button class="gender-btn btn-neu" onclick="checkGender('neut')">NEUTER<span>město / moře / kuře / stavení</span></button>
    </div>

    <button id="main-submit" onclick="handleLogic()" disabled>Načítání dat...</button>
    
    <div id="lifeline-area" class="hidden" style="margin-top: 15px; background: #fdf2f2; padding: 10px; border-radius: 10px;">
        <p style="font-size: 0.9rem; margin-bottom: 5px;">Potřebujete nápovědu?</p>
        <button onclick="revealAnswer()" style="background: #e67e22; color: white; border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer;">Ukázat odpověď</button>
        <button onclick="nextWord()" style="background: #7f8c8d; color: white; border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer; margin-left: 5px;">Přeskočit slovo</button>
    </div>
    
    <div id="feedback" class="feedback"></div>
</div>

<script src="nouns.js"></script>
<script src="sentences.js"></script>

<script>
let currentWord = {};
let currentLevel = 1;
let wikiForms = {};
let currentCaseObj = null;

document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !document.getElementById('input-area').classList.contains('hidden')) {
        handleLogic();
    }
});

const targetCases = [
    { label: "Genitiv (2.)", id: "Genitiv" },
    { label: "Dativ (3.)", id: "Dativ" },
    { label: "Akuzativ (4.)", id: "Akuzativ" },
    { label: "Lokál (6.)", id: "Lokál" },
    { label: "Instrumentál (7.)", id: "Instrumentál" }
];





async function fetchWikiForms(word) {
    const submitBtn = document.getElementById('main-submit');
    const statusMsg = document.getElementById('status-msg');
    submitBtn.disabled = true;
    statusMsg.innerText = `Stahuji kompletní tabulku...`;
    
    wikiForms = {}; 
    const cases = ["Nominativ", "Genitiv", "Dativ", "Akuzativ", "Vokativ", "Lokál", "Instrumentál"];
    const caseMap = { "Nominativ": "1", "Genitiv": "2", "Dativ": "3", "Akuzativ": "4", "Vokativ": "5", "Lokál": "6", "Instrumentál": "7" };
    const numbers = ["S", "P"];

    console.log(`📂 Fetching FULL table for: ${word}`);

    try {
        const fetchPromises = [];

        cases.forEach(cName => {
            numbers.forEach(num => {
                const promise = fetch('https://lessons-487913.ey.r.appspot.com/process', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mode: 'noun', word: word, case: caseMap[cName], number: num })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.result) {
                        let forms = data.result.split(',').map(f => {
                            let parts = f.trim().split(' ');
                            return parts[parts.length - 1].toLowerCase();
                        });

                        if (!wikiForms[cName]) wikiForms[cName] = { sg: [], pl: [] };
                        
                        // Store as an ARRAY instead of a single string
                        if (num === "S") wikiForms[cName].sg = forms;
                        else wikiForms[cName].pl = forms;
                    }
                });
                fetchPromises.push(promise);
            });
        });

        await Promise.all(fetchPromises);
        
        // Replace the old console.table block with this:
        const caseOrder = ["Nominativ", "Genitiv", "Dativ", "Akuzativ", "Vokativ", "Lokál", "Instrumentál"];
        const printableTable = {};

        caseOrder.forEach(c => {
            if (wikiForms[c]) {
                printableTable[c] = {
                    Sg: wikiForms[c].sg.join(' / '), // Flattens the array [a, b] into "a / b"
                    Pl: wikiForms[c].pl.join(' / ')
                };
            }
        });
        console.table(printableTable);
        statusMsg.innerText = "Tabulka načtena!";
        submitBtn.disabled = false;

    } catch (e) {
        console.error("❌ Scraper Error:", e);
        statusMsg.innerText = "Chyba při stahování tabulky.";
        submitBtn.disabled = false;
    }
}








function nextWord() {
    if (typeof fullDatabase === 'undefined') return;
    currentWord = fullDatabase[Math.floor(Math.random() * fullDatabase.length)];
    currentLevel = 1;
    document.getElementById('sentence-container').classList.add('hidden');
    fetchWikiForms(currentWord.cz);
    showLevel1();
}

function showLevel1() {
    updateUI("LEVEL 1", "Přeložte do češtiny:", currentWord.en, 'input');
}

function showLevel2() {
    updateUI("LEVEL 2", "Určete rod podstatného jména:", currentWord.cz, 'gender');
}

function showLevel3() {
    const sgBtn = document.getElementById('use-singular');
    const plBtn = document.getElementById('use-plural');

    // Default to singular if the buttons aren't found in HTML yet
    const useSg = sgBtn ? sgBtn.checked : true;
    const usePl = plBtn ? plBtn.checked : false;

    // Pick a random case (avoiding Nominative)
    const validCases = targetCases.filter(c => c.id !== "Nominativ");
    currentCaseObj = validCases[Math.floor(Math.random() * validCases.length)];

    // Decide Singular or Plural
    let pool = [];
    if (useSg) pool.push("S");
    if (usePl) pool.push("P");
    if (pool.length === 0) pool = ["S"]; // Fallback
    
    const selectedNum = pool[Math.floor(Math.random() * pool.length)];
    const numLabel = selectedNum === "S" ? "Jednotné číslo" : "Množné číslo";

    // Grab the answer from the wikiForms table your console logged
    // Get the array of possible answers
    const possibleAnswers = selectedNum === "S" ? 
        wikiForms[currentCaseObj.id].sg : 
        wikiForms[currentCaseObj.id].pl;

    currentWord.step3Answers = possibleAnswers; // Note the plural 'Answers'
    console.log(`🎯 Step 3 Targets:`, possibleAnswers);

    updateUI("LEVEL 3", 
        `Napište tvar pro: <span class="case-highlight">${currentCaseObj.label}</span><br>(${numLabel})`, 
        currentWord.cz, 
        'input'
    );
}

function showLevel4() {
    let sentence = null;
    if (typeof sentenceDb !== 'undefined') {
        const matches = sentenceDb.filter(s => 
            s.lemma && s.lemma.trim().toLowerCase() === currentWord.cz.trim().toLowerCase()
        );
        if (matches.length > 0) {
            sentence = matches[Math.floor(Math.random() * matches.length)];
        }
    }

    const sc = document.getElementById('sentence-container');
    if (sentence) {
        sc.innerText = sentence.sentence; 
        currentWord.lvl4Answer = sentence.answer;
        console.log("STEP 4 ANSWER EXPECTED:", currentWord.lvl4Answer);
    } else {
        sc.innerText = `Věta pro "${currentWord.cz}" nebyla nalezena v databázi.`;
        currentWord.lvl4Answer = currentWord.cz;
    }

    updateUI("LEVEL 4", "Doplňte správný tvar do věty:", "", 'input');
    sc.classList.remove('hidden');
    document.getElementById('target-display').innerText = currentWord.cz;
}

let attempts = 0;

function handleLogic() {
    const val = document.getElementById('user-input').value.trim().toLowerCase();
    let correct = false;

    if (currentLevel === 1) correct = (val === currentWord.cz.toLowerCase());
    else if (currentLevel === 3) {
            // Check if the input exists anywhere in the array of correct forms
            correct = currentWord.step3Answers.includes(val);
        }
    else if (currentLevel === 4) correct = (val === currentWord.lvl4Answer.toLowerCase());

    if (correct) {
        processCorrect();
    } else {
        attempts++;
        showFeedback(`✕ Špatně! (${attempts}/3)`, "var(--accent)");
        if (attempts >= 3) showLifeline();
    }
}

function processCorrect() {
    showFeedback("✓ Výborně!", "var(--success)");
    attempts = 0;
    hideLifeline();
    currentLevel++;
    setTimeout(() => {
        if (currentLevel === 2) showLevel2();
        else if (currentLevel === 3) showLevel3();
        else if (currentLevel === 4) showLevel4();
        else nextWord();
    }, 800);
}

function checkGender(choice) {
    const pattern = currentWord.pattern.toLowerCase().trim();
    const mapping = {
        'masc_anim': ['pán', 'muž', 'předseda', 'soudce'],
        'masc_inan': ['hrad', 'stroj'],
        'fem': ['žena', 'růže', 'píseň', 'kost'],
        'neut': ['město', 'moře', 'kuře', 'stavení']
    };

    if (mapping[choice] && mapping[choice].includes(pattern)) {
        processCorrect();
    } else {
        attempts++;
        showFeedback(`✕ Špatný rod! (${attempts}/3)`, "var(--accent)");
        if (attempts >= 3) showLifeline();
    }
}

function showFeedback(text, color) {
    const f = document.getElementById('feedback');
    f.innerText = text;
    f.style.color = color;
}

function showLifeline() {
    document.getElementById('lifeline-area').classList.remove('hidden');
}

function hideLifeline() {
    document.getElementById('lifeline-area').classList.add('hidden');
}

function revealAnswer() {
    let answer = "";
    if (currentLevel === 1) answer = currentWord.cz;
    else if (currentLevel === 2) answer = `Vzor: ${currentWord.pattern}`;
    else if (currentLevel === 3) {
        // This uses the targets we saved during showLevel3
        answer = currentWord.step3Answers.join(" / ");
    }
    else if (currentLevel === 4) answer = currentWord.lvl4Answer;
    alert("Správná odpověď je: " + answer);
}

function updateUI(level, prompt, display, mode) {
    document.getElementById('level-indicator').innerText = level;
    document.getElementById('prompt').innerHTML = prompt;
    document.getElementById('target-display').innerText = display;
    document.getElementById('feedback').innerText = "";
    document.getElementById('input-area').classList.toggle('hidden', mode !== 'input');
    document.getElementById('main-submit').classList.toggle('hidden', mode !== 'input');
    document.getElementById('gender-area').classList.toggle('hidden', mode !== 'gender');
    const input = document.getElementById('user-input');
    input.value = "";
    if (mode === 'input') input.focus();
}

window.onload = nextWord;
</script>
</body>
</html>
