<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Czech Declension Finder</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 40px; background-color: #f8f9fa; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #333; text-align: center; margin-bottom: 25px; }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 6px; font-size: 16px; outline: none; }
        input:focus { border-color: #007bff; }
        button { padding: 12px 25px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #0056b3; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; display: none; }
        th, td { border: 1px solid #dee2e6; padding: 12px; text-align: left; }
        th { background-color: #f1f3f5; color: #495057; font-weight: 600; }
        tr:nth-child(even) { background-color: #fdfdfe; }
        .case-name { font-weight: bold; color: #007bff; width: 35%; background-color: #f8f9fa; }
        
        #status { text-align: center; margin-top: 15px; color: #666; font-style: italic; min-height: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Czech Declension</h2>
    <div class="search-box">
        <input type="text" id="wordInput" placeholder="Zadejte podstatné jméno (např. pes)..." onkeyup="if(event.key==='Enter') fetchAllForms()">
        <button onclick="fetchAllForms()">Hledat</button>
    </div>
    
    <div id="status"></div>

    <table id="resultTable">
        <thead>
            <tr>
                <th>Pád</th>
                <th>Jednotné</th>
                <th>Množné</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
async function fetchAllForms() {
    const word = document.getElementById('wordInput').value.trim();
    const status = document.getElementById('status');
    const table = document.getElementById('resultTable');
    const tbody = document.getElementById('tableBody');
    
    if(!word) return;

    console.clear();
    console.log(`%c Initializing search for: ${word} `, "background: #28a745; color: white; font-weight: bold;");
    
    status.innerText = "Vyhledávám...";
    table.style.display = "none";
    tbody.innerHTML = "";

    // We use allorigins.win as it's currently more stable for Wiktionary
    const targetUrl = `https://cs.wiktionary.org/wiki/${encodeURIComponent(word)}`;
    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;

    try {
        const response = await fetch(proxyUrl);
        
        if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
        
        const result = await response.json();
        // AllOrigins wraps the HTML in a 'contents' property
        const text = result.contents; 
        
        const parser = new DOMParser();
        const doc = parser.parseFromString(text, "text/html");

        const targetCases = [
            { label: "Nominativ (1.)", keys: ["nominativ", "1. pád"] },
            { label: "Genitiv (2.)", keys: ["genitiv", "2. pád"] },
            { label: "Dativ (3.)", keys: ["dativ", "3. pád"] },
            { label: "Akuzativ (4.)", keys: ["akuzativ", "4. pád"] },
            { label: "Vokativ (5.)", keys: ["vokativ", "5. pád"] },
            { label: "Lokál (6.)", keys: ["lokál", "6. pád"] },
            { label: "Instrumentál (7.)", keys: ["instrumentál", "7. pád"] }
        ];

        const allTables = doc.querySelectorAll('table.declension, table.inflection-table, table');
        let dataFound = false;

        for (let [index, t] of allTables.entries()) {
            const rows = Array.from(t.querySelectorAll('tr'));
            let tempBody = "";
            let matchCount = 0;

            targetCases.forEach(c => {
                const row = rows.find(r => {
                    const cells = Array.from(r.querySelectorAll('th, td'));
                    return cells.some(cell => c.keys.some(k => cell.innerText.toLowerCase().includes(k)));
                });

                if (row) {
                    const cells = row.querySelectorAll('td');
                    if (cells.length >= 2) {
                        tempBody += `
                            <tr>
                                <td class="case-name">${c.label}</td>
                                <td>${cells[0].innerText.trim()}</td>
                                <td>${cells[1].innerText.trim()}</td>
                            </tr>
                        `;
                        matchCount++;
                    }
                }
            });

            if (matchCount >= 3) {
                tbody.innerHTML = tempBody;
                dataFound = true;
                break; 
            }
        }

        if (dataFound) {
            status.innerText = "";
            table.style.display = "table";
        } else {
            status.innerText = "Slovo nebo tabulka nebyla nalezena.";
        }

    } catch (err) {
        status.innerText = "Chyba sítě: Proxy server pravděpodobně blokuje požadavek.";
        console.error("Fetch failure:", err);
    }
}
</script>

</body>
</html>
