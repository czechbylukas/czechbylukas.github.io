<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/language-selector.css">
    
    <script src="../scripts-header.js"></script>
    
    <title>Grammar Engine | HáCZech</title>

    <style>
        :root { 
            --primary: #2c3e50; 
            --success: #27ae60; 
            --warning: #f39c12; 
            --danger: #e74c3c;
            --border: #edf2f7;
        }
        
        body { background: #f8fafc; font-family: sans-serif; margin: 0; }

        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: 1px solid #ddd;
            width: 95%; 
            max-width: 550px; 
            margin: 40px auto; 
            text-align: center;
        }
        
        .subtitle { color: #94a3b8; margin-bottom: 25px; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }

        /* Restored: Your Preferred Input Rows */
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .row-triple { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        
        select, input { 
            padding: 12px 14px; 
            border: 2px solid var(--border); 
            border-radius: 10px; 
            font-size: 15px; 
            background: #f8fafc;
            outline: none;
            transition: 0.2s;
            width: 100%;
            box-sizing: border-box;
        }
        select:focus, input:focus { border-color: var(--primary); background: #fff; }

        .hidden-menu { display: none !important; }
        
        /* The "Winner" Result Card */
        #result-card { 
            display: none; 
            margin-top: 30px; 
            padding: 45px 20px; 
            border-radius: 16px; 
            background: #ffffff; 
            border: 2px solid var(--success);
            box-shadow: 0 15px 35px rgba(39, 174, 96, 0.1);
            text-align: center; 
            animation: slideIn 0.3s ease-out;
        }

        #result-text { 
            display: block;
            font-size: 52px; /* Massive & Clear */
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 15px;
            letter-spacing: -1.5px;
        }

        .badge-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; margin-bottom: 20px; }
        .badge { display: inline-block; padding: 6px 12px; border-radius: 6px; font-size: 11px; font-weight: bold; text-transform: uppercase; background: #eee; color: #666; }
        
        .btn-generate { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 16px; 
            border-radius: 12px; 
            font-size: 17px; 
            font-weight: bold; 
            cursor: pointer; 
            width: 100%; 
            transition: 0.2s;
            margin-top: 10px;
        }
        .btn-generate:hover { opacity: 0.9; transform: translateY(-1px); }

        .btn-clear { 
            background: none; 
            border: none; 
            color: #94a3b8; 
            text-decoration: underline; 
            cursor: pointer; 
            font-size: 13px; 
            margin-top: 10px; 
        }
        #unverified-warning {
            color: var(--danger);
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 10px;
            display: none; /* Keep it hidden by default */
        }


        /* Helper & Warning */
        .helper-box { background: #fff9e6; border: 1px dashed var(--warning); padding: 15px; border-radius: 12px; margin: 15px 0; text-align: left; }
        .warning-note { color: var(--danger); font-size: 13px; font-weight: bold; margin-bottom: 10px; display: none; }
        .loading { display: none; margin: 15px 0; font-style: italic; color: var(--primary); }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Small circular W badge */
        .badge-w {
            background: #27ae60;
            color: white;
            padding: 2px 7px;
            border-radius: 50%;
            font-size: 11px;
            font-weight: bold;
            cursor: help;
            display: inline-block;
            margin-right: 5px; /* Space between W and other badges */
            vertical-align: middle;
        }

        .wiki-error {
            display: block;
            width: 100%;
            font-size: 14px;
            color: #e74c3c;
            margin-top: 10px;
            padding-top: 8px;
            border-top: 1px dashed #ddd;
            font-weight: bold;
        } 






    </style>
</head>

<body class="home">

<header style="display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; background: white; border-bottom: 2px solid #2c3e50;">
    <div style="flex: 1; display: flex; align-items: center;" id="logo-placeholder"></div>

    <div style="flex: 1; text-align: center;">
        <h1>Grammar Engine</h1>
    </div>

    <div style="flex: 1; display: flex; justify-content: flex-end; align-items: center;">
        <div id="auth-status-container"></div>
    </div>
</header>

<aside id="sidebar-placeholder"></aside>

<main style="padding: 20px;">
    <div class="container">
        <p class="subtitle">Connected to Google Cloud Engine</p>


    <div class="row">
    <input type="text" style="display:none;" aria-hidden="true">
    
    <select id="mode" onchange="handleModeChange()">
        <option value="" disabled selected>Choose Category...</option>
        <option value="verb">Verb (Sloveso)</option>
        <option value="noun">Noun (Podstatné jméno)</option>
    </select>

    <input type="text" 
           id="grammar_query" 
           name="q_no_autofill"
           placeholder="Enter word..." 
           oninput="autoDetectPattern()" 
           autocomplete="one-time-code"
           spellcheck="false"
           role="presentation">
</div>

<div id="char-picker" style="margin: -5px 0 15px 0; display: flex; flex-wrap: wrap; gap: 5px; justify-content: center;">
    <script>
        ['ž','š','č','ř','ď','ť','ň','ě','á','é','í','ý','ó','ú','ů'].forEach(char => {
            document.write(`
                <span onclick="insertChar('${char}')" 
                      style="cursor:pointer; padding: 4px 8px; background: #fff; border-radius: 6px; 
                             font-weight: bold; border: 1px solid var(--border); font-size: 14px; color: var(--primary);">
                    ${char}
                </span>`);
        });
    </script>
</div>

    <div style="margin: 15px 0; display: flex; align-items: center; justify-content: center; gap: 8px;">
    <input type="checkbox" id="audio-toggle" checked style="width: 18px; height: 18px; cursor: pointer;">
    <label for="audio-toggle" style="cursor: pointer; font-weight: bold; color: #2c3e50;">Přehrát zvuk (Audio)</label>
</div>

        <div id="verb-options" class="row-triple hidden-menu">
            <select id="tense" onchange="toggleGender()">
                <option value="past">Past</option>
                <option value="present">Present</option>
            
                <option value="future">Future</option>
            </select>
            <select id="person">
                <option value="1">1. Person</option>
                <option value="2">2. Person</option>
                <option value="3">3. Person</option>
            </select>
            <select id="verb-number" onchange="updatePersonLabels()">
                <option value="S">Singular</option>
                <option value="P">Plural</option>
            </select>
        </div>

        <div id="noun-options" class="row hidden-menu">
            <select id="case">
                <option value="1">1. Nominativ</option>
                <option value="2">2. Genitiv</option>
                <option value="3">3. Dativ</option>
                <option value="4">4. Akuzativ</option>
                <option value="5">5. Vokativ</option>
                <option value="6">6. Lokál</option>
                <option value="7">7. Instrumentál</option>
            </select>
            <select id="noun-number">
                <option value="S">Singular</option>
                <option value="P">Plural</option>
            </select>
        </div>

        <div id="gender-row" class="hidden-menu">
            <select id="gender">
                <option value="M">Male Animate</option>
                <option value="Mi">Male Inanimate</option>
                <option value="F">Female</option>
                <option value="N">Neuter</option>
            </select>
        </div>

        <div id="noun-helper" class="helper-box hidden-menu">
            <label>I do not know this word, please help me identify it:</label>
            <div class="row">
                <select id="is_animate">
                    <option value="n">Inanimate (y/n)</option>
                    <option value="y">Living/Animate</option>
                </select>
                <select id="is_soft">
                    <option value="h">Hard Ending</option>
                    <option value="s">Soft Ending</option>
                </select>
            </div>
        </div>

        <div id="unverified-warning" class="warning-note">⚠️ Note: Result may be incorrect as the word is unverified.</div>

        <button type="button" class="btn-generate" id="submit-btn" onclick="callPythonAPI(event)">Generate Result →</button>
        <div class="loading" id="loader">Processing in Python...</div>
    </div>

    <div id="result-card">
        <span id="result-text" onclick="speakCzech(this.innerText)" style="cursor: pointer;" title="Click to replay"></span>
        <div id="badges" style="margin-bottom: 10px;"></div>
        <button type="button" onclick="resetUI()">Clear</button>
    </div>
</div> </main> <div id="enable-app-guide"></div>
<div id="footer-placeholder"></div>

<script>
    // ADD THIS: Load the sidebar and footer first
    fetch("/sidebar/sidebar.html").then(r => r.text()).then(d => { 
        document.getElementById("sidebar-placeholder").innerHTML = d; 
    });

    fetch("../footer.html").then(r => r.text()).then(d => { 
        document.getElementById("footer-placeholder").innerHTML = d; 
        const guide = document.getElementById('global-app-guide');
        if (guide) guide.style.display = 'block';
    });

let typingTimer;
let lastAlertedWord = ""; // Defined once at the top



function autoDetectPattern() {
    // Hide result card as soon as the user starts typing
    document.getElementById('result-card').style.display = 'none';

    const mode = document.getElementById('mode').value;
    const word = document.getElementById('grammar_query').value.toLowerCase().trim();
    if (!word) return;

    // STEP 1: "Guess" the pattern (Hard/Soft) immediately like before
    const softCons = ['ž', 'š', 'č', 'ř', 'c', 'j', 'ď', 'ť', 'ň'];
    const hardCons = ['h', 'k', 'r', 'd', 't', 'n'];
    const lastChar = word.slice(-1);

    if (softCons.includes(lastChar)) {
        document.getElementById('is_soft').value = 's';
    } else if (hardCons.includes(lastChar) || word.endsWith('ch')) {
        document.getElementById('is_soft').value = 'h';
    }

    // STEP 2: Check database in background to see if we need the popup/helper
    clearTimeout(typingTimer);
    if (mode === 'noun' && word.length > 2) {
        typingTimer = setTimeout(() => preVerifyNoun(mode, word), 600);
    }
}


async function preVerifyNoun(mode, word) {
    try {
        const response = await fetch('https://lessons-487913.ey.r.appspot.com/process', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ mode: mode, word: word, check_only: true }) 
        });
        const data = await response.json();
        
        const isUnverified = !!(data.status && data.status.includes('UNVERIFIED'));
        
        // Show popup whenever the word is unverified
        if (isUnverified) {
            alert("Word not found in database! Using grammar rules to guess. Please check the helper box.");
        }

        updateNounHelperVisibility(mode, word, isUnverified);
    } catch (e) { 
        console.log("Background check failed"); 
    }
}

function updateNounHelperVisibility(mode, word, isUnverified = false) {
    const helperBox = document.getElementById('noun-helper');
    const softHardSelect = document.getElementById('is_soft');
    const animateSelect = document.getElementById('is_animate');

    if (mode === 'noun' && word.length > 0 && isUnverified) {
        helperBox.classList.remove('hidden-menu');
        const lastChar = word.slice(-1);
        const consonants = ['b', 'c', 'č', 'd', 'ď', 'f', 'h', 'ch', 'j', 'k', 'l', 'm', 'n', 'ň', 'p', 'r', 'ř', 's', 'š', 't', 'ť', 'v', 'z', 'ž'];
        const ambigConsonants = ['b', 'f', 'l', 'm', 'p', 's', 'v', 'z'];

        animateSelect.style.display = (consonants.includes(lastChar) || word.endsWith('ch')) ? 'block' : 'none';
        softHardSelect.style.display = ambigConsonants.includes(lastChar) ? 'block' : 'none';
    } else {
        helperBox.classList.add('hidden-menu');
    }
}

function handleModeChange() {
    const mode = document.getElementById('mode').value;
    document.getElementById('grammar_query').value = ''; // Clear the input field
    document.getElementById('verb-options').classList.toggle('hidden-menu', mode !== 'verb');
    document.getElementById('noun-options').classList.toggle('hidden-menu', mode !== 'noun');
    // Ensure helper only shows for nouns and hide when switching modes
    const word = document.getElementById('grammar_query').value;
    updateNounHelperVisibility(mode, word);
    toggleGender();
    updatePersonLabels();
}

function toggleGender() {
    const mode = document.getElementById('mode').value;
    const tense = document.getElementById('tense').value;
    const gRow = document.getElementById('gender-row');
    
    // Updated: Only show for past tense, hide for future/present
    gRow.classList.toggle('hidden-menu', !(mode === 'verb' && tense === 'past'));
}

async function callPythonAPI(event) {
    if (event) event.preventDefault();
    const mode = document.getElementById('mode').value;
    const word = document.getElementById('grammar_query').value.trim();

    console.log("--- Starting API Call ---");
    console.log("Word:", word, "Mode:", mode);

    document.getElementById('unverified-warning').style.display = 'none';

    const btn = document.getElementById('submit-btn');
    const loader = document.getElementById('loader');
    btn.disabled = true;
    loader.style.display = 'block';

    const payload = {
        mode: mode,
        word: word,
        tense: mode === 'verb' ? (document.getElementById('tense').value || 'present') : null,
        person: document.getElementById('person').value,
        gender: document.getElementById('gender-row').classList.contains('hidden-menu') ? 'M' : document.getElementById('gender').value,
        case: document.getElementById('case').value,
        number: (mode === 'verb') ? document.getElementById('verb-number').value : document.getElementById('noun-number').value,
        is_animate: document.getElementById('is_animate').value === 'y',
        is_soft: document.getElementById('is_soft').value === 's'
    };

    try {
        const response = await fetch('https://lessons-487913.ey.r.appspot.com/process', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        const data = await response.json();
        
        console.log("Python Data Received:", data);

        showResult(data.result || "No result", data.status || []);

        if (mode === 'noun' && data.result) {
            const caseVal = document.getElementById('case').value;
            const numVal = document.getElementById('noun-number').value;
            verifyWithWiktionary(word, data.result, caseVal, numVal);
        }
    } catch (err) {
        console.error("API Error:", err);
        showResult("Server Connection Failed", ["OFFLINE"]);
    } finally {
        btn.disabled = false;
        loader.style.display = 'none';
    }
}

function showResult(text, statusArray) {
    speakCzech(text);

    const card = document.getElementById('result-card');
    card.style.display = 'block';
    document.getElementById('result-text').innerText = text;
    
    const badgesContainer = document.getElementById('badges');
    badgesContainer.innerHTML = ''; 

    // Remove duplicates and empty values
    const uniqueStatuses = [...new Set(statusArray)].filter(s => s !== null && s !== "");

    uniqueStatuses.forEach(s => {
        const span = document.createElement('span');
        span.className = 'badge';

        if (s === true) { 
            span.style.background = 'var(--success)';
            span.style.color = 'white';
            span.innerText = "VERIFIED";
        } else if (s === "UNVERIFIED") {
            span.className = 'badge badge-warning';
            span.innerText = "GUESSED";
        } else if (s === "Irregular") {
            span.style.background = 'var(--danger)';
            span.style.color = 'white';
            span.innerText = "IRREGULAR";
        } else if (s === "Singular" || s === "Plural") {
            span.style.background = '#e9ecef';
            span.style.color = '#495057';
            span.innerText = s;
        } else {
            // This is the Pattern ID
            span.style.background = 'var(--primary)';
            span.style.color = 'white';
            span.innerText = "Pattern: " + s;
        }
        badgesContainer.appendChild(span);
    });
}

function resetUI() {
    document.getElementById('result-card').style.display = 'none';
    document.getElementById('grammar_query').value = '';
    document.getElementById('unverified-warning').style.display = 'none';

    // ADD THIS: Reset the text color to the default primary color
    document.getElementById('result-text').style.color = 'var(--primary)';

    lastAlertedWord = ""; // Reset alert tracker
    
    updateNounHelperVisibility(document.getElementById('mode').value, '', false);
    document.getElementById('grammar_query').focus();
}

document.getElementById('grammar_query').addEventListener('keydown', (e) => { if (e.key === 'Enter') callPythonAPI(e); });
   
   


// Whenever any input or select changes, hide the previous result
document.querySelectorAll('input, select').forEach(element => {
    element.addEventListener('change', () => {
        document.getElementById('result-card').style.display = 'none';
    });
});




function updatePersonLabels() {
    const isPlural = document.getElementById('verb-number').value === 'P';
    const personSelect = document.getElementById('person');
    const labels = isPlural 
        ? ["1. Person (my)", "2. Person (vy)", "3. Person (oni/ony/ona)"] 
        : ["1. Person (já)", "2. Person (ty)", "3. Person (on/ona/ono)"];

    Array.from(personSelect.options).forEach((opt, i) => {
        opt.text = labels[i];
    });
}





// Function to insert special characters into the grammar query input
function insertChar(char) {
    const input = document.getElementById('grammar_query');
    const start = input.selectionStart;
    const end = input.selectionEnd;
    
    // Insert character at cursor position
    input.setRangeText(char, start, end, 'end');
    
    // Return focus to the input
    input.focus();
    
    // Trigger the input event so autoDetectPattern() runs
    input.dispatchEvent(new Event('input', { bubbles: true }));
}




function speakCzech(text) {
    const isAudioOn = document.getElementById('audio-toggle').checked;
    if (!isAudioOn || !window.speechSynthesis) return;

    const utterance = new SpeechSynthesisUtterance(text);
    
    // 1. Get all available system voices
    const voices = window.speechSynthesis.getVoices();
    
    // 2. Find a voice that matches 'cs' (Czech)
    // We look for 'cs-CZ' first, then any 'cs'
    const czechVoice = voices.find(v => v.lang === 'cs-CZ') || 
                       voices.find(v => v.lang.toLowerCase().includes('cs'));

    if (czechVoice) {
        utterance.voice = czechVoice;
    } else {
        // 3. Fallback: If no Czech voice object is found, we tell the 
        // browser to try its best with the language tag anyway.
        utterance.lang = 'cs-CZ';
    }

    utterance.rate = 0.9;

    // Stop any current speech before starting new one
    window.speechSynthesis.cancel(); 
    window.speechSynthesis.speak(utterance);
}


// This ensures voices are loaded and ready before the first click
window.speechSynthesis.getVoices();
if (speechSynthesis.onvoiceschanged !== undefined) {
    speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}





const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycby99XOwLtQNlEl5--UQ9KsQWzuM8pKvgdQT1AbrxcPBz4rE5P2eBa3ACY_KuT8T9ImI/exec";

async function logMismatchToSheet(word, caseLabel, number, myApp, wiki) {
    fetch(GOOGLE_SHEET_URL, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify({ word, case: caseLabel, number, myApp, wiki })
    }).catch(e => console.log("Logging failed", e));
}







async function verifyWithWiktionary(word, myResult, caseValue, numberValue) {
    const badgesContainer = document.getElementById('badges');
    const resultTextElement = document.getElementById('result-text');
    const warningElement = document.getElementById('unverified-warning');

    // Remove old W badge if it exists
    const existingW = badgesContainer.querySelector('.badge-w');
    if (existingW) existingW.remove();

    // Map your numeric cases to the labels your Python scraper uses
    const caseMap = { 
        "1": "Nominativ (1.)", "2": "Genitiv (2.)", "3": "Dativ (3.)", 
        "4": "Akuzativ (4.)", "5": "Vokativ (5.)", "6": "Lokál (6.)", 
        "7": "Instrumentál (7.)" 
    };
    const targetCaseLabel = caseMap[caseValue];

    try {
        // CALL YOUR OWN API INSTEAD OF PROXIES
        const response = await fetch(`https://lessons-487913.ey.r.appspot.com/scrape_declension?word=${encodeURIComponent(word)}`);
        
        if (!response.ok) throw new Error("Not found");

        const wikiData = await response.json();
        
        // Find the specific case row in the returned list
        const caseRow = wikiData.find(item => item.case === targetCaseLabel);

        if (caseRow) {
            const wikiVersion = numberValue === "S" ? caseRow.singular : caseRow.plural;
            
            // Add the 'W' badge
            const wBadge = document.createElement('span');
            wBadge.className = 'badge-w';
            wBadge.innerText = 'W';
            badgesContainer.prepend(wBadge);

            // If the Wiki version is different from your algorithm, update the text
            if (myResult.toLowerCase() !== wikiVersion.toLowerCase()) {
                resultTextElement.innerText = wikiVersion;
                resultTextElement.style.color = '#27ae60'; // Green to show it's verified
                speakCzech(wikiVersion);
            }
            warningElement.style.display = 'none';
        }
    } catch (err) {
        console.log("Wiktionary check failed or word not found.");
        warningElement.style.display = 'block';
    }
}
