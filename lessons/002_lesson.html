    let db = null;

        ]},
        "odkdy": { en: "since when", options: [
            { ans: "od středy", bold: "dy" }, { ans: "od rána", bold: "na" }, { ans: "od víkendu", bold: "du" }, { ans: "od pondělí", bold: "lí" }, { ans: "od včerejška", bold: "ka" }

        "dokdy": { en: "until when", options: [

        ]},
        "jak": { en: "how", options: [

        "co": { en: "what", options: [

        ]},
        "bez koho": { en: "without whom", options: [
            { ans: "bez kamaráda", bold: "da" }, { ans: "bez přítele", bold: "le" }, { ans: "bez dcery", bold: "ry" }, { ans: "bez maminky", bold: "ky" }, { ans: "bez syna", bold: "na" }
        ]},
        "pro koho": { en: "for whom", options: [
            { ans: "pro tátu", bold: "tu" }, { ans: "pro dceru", bold: "ru" }, { ans: "pro syna", bold: "na" }, { ans: "pro maminku", bold: "ku" }, { ans: "pro kamaráda", bold: "da" }
        ]},
        "s kým": { en: "with whom", options: [
            { ans: "s maminkou", bold: "ou" }, { ans: "se synem", bold: "em" }, { ans: "s dcerou", bold: "ou" }, { ans: "s kamarádem", bold: "em" }, { ans: "s přítelem", bold: "em" }
        ]}, 
        "bez čeho": { en: "without what", options: [
            { ans: "bez cukru", bold: "ru" }, { ans: "bez rýže", bold: "že" }, { ans: "bez vody", bold: "dy" }, { ans: "bez auta", bold: "ta" }, { ans: "bez počítače", bold: "če" }
        ]},
        "o kom": { en: "about whom", options: [
            { ans: "o sousedovi", bold: "vi" }, { ans: "o majitelovi", bold: "vi" }, { ans: "o trenérovi", bold: "vi" }, { ans: "o koučovi", bold: "vi" }, { ans: "o tátovi", bold: "vi" }
        ]}, 
        "o čem": { en: "what about", options: [
            { ans: "v okně", bold: "ně" }, { ans: "v koupelně", bold: "ně" }, { ans: "v ložnici", bold: "ci" }, { ans: "v bytě", bold: "tě" }, { ans: "v pokoji", bold: "ji" }
        ]},
        "čím": { en: "by/with what", options: [
            { ans: "autem", bold: "em" }, { ans: "jachtou", bold: "ou" }, { ans: "autobusem", bold: "em" }, { ans: "přístrojem", bold: "em" }, { ans: "vlakem", bold: "em" }
        ]},
        "s čím": { en: "with what", options: [
            { ans: "se solí", bold: "lí" }, { ans: "s rýží", bold: "ží" }, { ans: "s cukrem", bold: "em" }, { ans: "s prací", bold: "cí" }, { ans: "s kávou", bold: "ou" }
        ]},
        "díky čemu": { en: "thanks to what", options: [
            { ans: "díky volnu", bold: "nu" }, { ans: "díky posilovně", bold: "ně" }, { ans: "díky galerii", bold: "ii" }, { ans: "díky víkendu", bold: "du" }, { ans: "díky počítači", bold: "či" }
        ]}
    };

    const days = ["v neděli", "v pondělí", "v úterý", "ve středu", "ve čtvrtek", "v pátek", "v sobotu", "o víkendu", "minulý týden"];

    async function initDatabase() {
        try {
            const sqlPromise = initSqlJs({ locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/${file}` });
            const dataPromise = fetch('../VocabSQL_database/czech_master.db').then(res => res.arrayBuffer());
            const [SQL, buf] = await Promise.all([sqlPromise, dataPromise]);
            db = new SQL.Database(new Uint8Array(buf));
            
            try {
                const mapRes = await fetch('verb_mappings.json');
                if(mapRes.ok) {
                    verbMappings = await mapRes.json();
                } else {
                    loadFromLocalStorageFallback();
                }
            } catch(e) {
                loadFromLocalStorageFallback();
            }
            buildAdminGridUI();
        } catch (err) { console.error("Database failed:", err); }
    }

    function loadFromLocalStorageFallback() {
        const localData = localStorage.getItem('local_verb_mappings');
        if (localData) {
            verbMappings = JSON.parse(localData);
        }
    }

    function toggleAdminMode() {
        isAdminMode = document.getElementById('admin-mode-checkbox').checked;
        document.getElementById('export-btn').style.display = isAdminMode ? 'inline-block' : 'none';
        if (!isAdminMode) document.getElementById('admin-panel').style.display = 'none';
        else if (currentVerb) showAdminControlsForVerb(currentVerb);
        updateVerbBadge();
    }

    // Refactored to generate grid containing 5 inputs per question item
    function buildAdminGridUI() {
        const container = document.getElementById('admin-questions-grid');
        container.innerHTML = "";
        Object.keys(questionMap).forEach(key => {
            const item = document.createElement('div');
            item.className = 'q-item';
            
            let rowHTML = `
                <div class="q-item-header">
                    <input type="checkbox" id="admin-q-${key}">
                    <span>${key} <small style="color:#777; font-weight:normal;">(${questionMap[key].en})</small></span>
                </div>
                <div class="options-row-grid">
            `;
            
            for(let i = 0; i < 5; i++) {
                const defaultOpt = questionMap[key].options[i] || { ans: "", bold: "" };
                rowHTML += `
                    <div class="option-box">
                        <span>Opce ${i+1}</span>
                        <input type="text" id="admin-ans-${key}-${i}" placeholder="Odpověď" value="${defaultOpt.ans}">
                        <input type="text" id="admin-bold-${key}-${i}" placeholder="Bold" value="${defaultOpt.bold}">
                    </div>
                `;
            }
            rowHTML += `</div>`;
            item.innerHTML = rowHTML;
            container.appendChild(item);
        });
    }

    function showAdminControlsForVerb(verb) {
        if (!isAdminMode) return;
        document.getElementById('admin-panel').style.display = 'block';
        document.getElementById('admin-verb-title').innerText = verb;
        
        const config = verbMappings[verb] || { allowed_questions: [], custom_answers: {} };
        
        Object.keys(questionMap).forEach(key => {
            const check = document.getElementById(`admin-q-${key}`);
            const isAllowed = config.allowed_questions && config.allowed_questions.includes(key);
            check.checked = isAllowed;
            
            for(let i = 0; i < 5; i++) {
                const ansInput = document.getElementById(`admin-ans-${key}-${i}`);
                const boldInput = document.getElementById(`admin-bold-${key}-${i}`);
                
                if (isAllowed && config.custom_answers?.[key]?.options?.[i]) {
                    ansInput.value = config.custom_answers[key].options[i].ans;
                    boldInput.value = config.custom_answers[key].options[i].bold;
                } else if (isAllowed && i === 0 && config.custom_answers?.[key]?.ans) {
                    // Legacy single-string layout fallback fix
                    ansInput.value = config.custom_answers[key].ans;
                    boldInput.value = config.custom_answers[key].bold;
                } else {
                    const fallback = questionMap[key].options[i] || { ans: "", bold: "" };
                    ansInput.value = fallback.ans;
                    boldInput.value = fallback.bold;
                }
            }
        });
    }

    function saveLocalMapping() {
        if (!currentVerb) return;
        let allowed_questions = [];
        let custom_answers = {};
        
        Object.keys(questionMap).forEach(key => {
            const check = document.getElementById(`admin-q-${key}`);
            if (check.checked) {
                allowed_questions.push(key);
                
                let optionsArr = [];
                for(let i = 0; i < 5; i++) {
                    optionsArr.push({
                        ans: document.getElementById(`admin-ans-${key}-${i}`).value,
                        bold: document.getElementById(`admin-bold-${key}-${i}`).value
                    });
                }
                custom_answers[key] = { options: optionsArr };
            }
        });

        verbMappings[currentVerb] = {
            approved: true,
            allowed_questions: allowed_questions,
            custom_answers: custom_answers
        };

        localStorage.setItem('local_verb_mappings', JSON.stringify(verbMappings));
        updateVerbBadge();
        alert(`Uloženo lokálně do mezipaměti pro "${currentVerb}"!`);
    }

    function updateVerbBadge() {
        const badgeSpan = document.getElementById('verb-status-badge');
        if (!currentVerb || !isAdminMode) {
            badgeSpan.innerHTML = "";
            return;
        }
        if (verbMappings[currentVerb] && verbMappings[currentVerb].approved) {
            badgeSpan.innerHTML = `<span class="badge-status status-approved">Schváleno</span>`;
        } else {
            badgeSpan.innerHTML = `<span class="badge-status status-unapproved">Neschváleno</span>`;
        }
    }

    function exportJsonFile() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(verbMappings, null, 2));
        const downloadAnchor = document.createElement('a');
        downloadAnchor.setAttribute("href", dataStr);
        downloadAnchor.setAttribute("download", "verb_mappings.json");
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click();
        downloadAnchor.remove();
    }

    function handleGenderChange() {
        const select = document.getElementById('gender-switch');
        if (step !== 0) {
            alert("Nemůžeš měnit rod během probíhající lekce!");
            select.value = lastGender; 
            return;
        }
        lastGender = select.value;
        document.getElementById('input-section').style.display = 'block';
        document.getElementById('verb-input').focus();
    }

    function isValidVerb(val) {
        return /t$|t\s+se$|t\s+si$/.test(val.trim().toLowerCase());
    }

    function checkInputForButton() {
        const input = document.getElementById('verb-input');
        const btn = document.getElementById('start-btn');
        btn.disabled = !isValidVerb(input.value);
    }

    async function getRandomVerbFromDB() {
        if (!db) return;
        const lang = localStorage.getItem("selectedLanguage") || "en";
        const langCol = "trans_" + (lang === "cs" ? "en" : lang);
        
        try {
            let query = `SELECT lemma, synonym, vid_pair, ${langCol}, pos 
                         FROM words 
                         WHERE (pos = 'verb' OR pos LIKE 'verb,%' OR pos LIKE '%,verb') 
                         AND level = 'A1' 
                         AND lemma LIKE '%t'`;
                         
            if (!isAdminMode) {
                const approvedVerbs = Object.keys(verbMappings).filter(k => verbMappings[k].approved === true);
                if (approvedVerbs.length > 0) {
                    const dynamicList = approvedVerbs.map(v => `'${v.replace(/'/g, "''")}'`).join(",");
                    query += ` AND lemma IN (${dynamicList})`;
                } else {
                    document.getElementById('translation-prompt').innerText = "Žádná schválená slovesa v konfiguraci.";
                    return;
                }
            }
            
            query += ` ORDER BY RANDOM() LIMIT 1`;
            const res = db.exec(query);
            
            if (res[0]) {
                const [lemma, synonym, vid_pair, translation, pos] = res[0].values[0];
                
                validAnswers = [];
                if (lemma) validAnswers.push(lemma.toLowerCase().trim());
                if (synonym) synonym.split(',').forEach(s => { let c = s.toLowerCase().trim(); if (c) validAnswers.push(c); });
                if (vid_pair) vid_pair.split(/[,/]/).forEach(v => { let c = v.toLowerCase().trim(); if (c) validAnswers.push(c); });

                document.getElementById('translation-prompt').innerText = `Přelož: ${translation}`;
                const input = document.getElementById('verb-input');
                input.value = "";
                input.focus();
                checkInputForButton();
            }
        } catch (e) { console.error("Random verb error:", e); }
    }

    async function startLesson() {
        const input = document.getElementById('verb-input');
        let val = input.value.trim().toLowerCase();
        
        if (validAnswers.length > 0 && !validAnswers.includes(val)) {
            alert(`Špatně. Příklady správných odpovědí: ${validAnswers.join(", ")}`);
            return;
        }

        if (!isValidVerb(val)) return;
        
        if (!isAdminMode && (!verbMappings[val] || !verbMappings[val].approved)) {
            alert("Toto sloveso zatím nebylo schváleno k výuce.");
            return;
        }

        document.getElementById('translation-prompt').innerText = "";
        validAnswers = []; 
        currentVerb = val;
        
        let baseVerb = val.split(" ")[0];
        if (baseVerb.endsWith("nout")) {
            currentVerbStem = baseVerb.slice(0, -4);
        } else {
            currentVerbStem = baseVerb.replace(/t$/, '');
        } 
        
        let verbExists = false; 
        if (db) {
            try {
                const stmt = db.prepare("SELECT is_irr, irr_type FROM words WHERE lemma = ? AND pos LIKE '%verb%' LIMIT 1");
                stmt.bind([val]);
                if (stmt.step()) {
                    verbExists = true; 
                    const row = stmt.get();
                    if (row[0] === 1 && [1, 2, 5].includes(row[1])) {
                        const overStmt = db.prepare("SELECT past_participle FROM overrides WHERE form_key = ? LIMIT 1");
                        overStmt.bind([val]);
                        if (overStmt.step()) {
                            isCurrentlyIrregular = true;
                            let fullPast = overStmt.get()[0].split(" ")[0];
                            currentVerbStem = fullPast.endsWith('l') ? fullPast.slice(0, -1) : fullPast;
                        }
                        overStmt.free();
                    }
                }
                stmt.free();
                
                let allowedKeys = Object.keys(questionMap);
                let activeConfig = verbMappings[val];
                if (activeConfig && activeConfig.allowed_questions && activeConfig.allowed_questions.length > 0) {
                    allowedKeys = activeConfig.allowed_questions;
                }
                
                const randomKey = allowedKeys[Math.floor(Math.random() * allowedKeys.length)];
                const baseQuestionData = questionMap[randomKey];
                const optionIndex = Math.floor(Math.random() * 5);
                
                let finalAns = "";
                let finalBold = "";

                // Enhanced structural detection fallback protection loops
                if (activeConfig?.custom_answers?.[randomKey]?.options?.[optionIndex]) {
                    finalAns = activeConfig.custom_answers[randomKey].options[optionIndex].ans;
                    finalBold = activeConfig.custom_answers[randomKey].options[optionIndex].bold;
                } else if (activeConfig?.custom_answers?.[randomKey]?.ans) {
                    finalAns = activeConfig.custom_answers[randomKey].ans;
                    finalBold = activeConfig.custom_answers[randomKey].bold;
                } else {
                    finalAns = baseQuestionData.options[optionIndex].ans;
                    finalBold = baseQuestionData.options[optionIndex].bold;
                }
                
                let enTrans = baseQuestionData.en;
                const qStmt = db.prepare("SELECT trans_en FROM words WHERE lemma = ? AND lesson = '02 Tázací slova' LIMIT 1");
                qStmt.bind([randomKey]);
                if (qStmt.step()) enTrans = qStmt.get()[0];
                qStmt.free();
                
                currentQuestionWord = { cz: randomKey, en: enTrans, answer: finalAns, boldPart: finalBold };
            } catch (e) { console.error(e); }
        }

        window.currentVerbVerified = verbExists;
        if (!verbExists && !confirm(`Sloveso "${val}" neznám. Chceš přesto pokračovat?`)) return;

        updateVerbBadge();
        showAdminControlsForVerb(currentVerb);

        document.getElementById('input-section').style.display = 'none';
        document.getElementById('lesson-section').style.display = 'block';
        document.getElementById('verb-info-display').innerHTML = " | " + val.replace(/t(\s|$)/, '<b style="color:red">t</b>$1');
        document.getElementById('question-part').innerHTML = "";
        showQuestion();
    }

    function showQuestion() {
        step = 1;
        const day = days[dayIdx];
        const g = document.getElementById('gender-switch').value;
        const endings = { 'M': 'l', 'F': 'la', 'N': 'lo', 'Pl': 'li', 'PlFem': 'ly', 'PlN': 'la' };
        let aux = (g === 'PlN') ? '<span style="color:#999">__</span>' : (g.startsWith('Pl') ? "jste" : "jsi");
        
        document.getElementById('sentence-display').innerHTML = `Co <span class="blue-bold">${aux}</span> děla<span class="blue-bold">${endings[g]||'l'}</span> ${day}?`;
        document.getElementById('answer-display').innerText = "";
        document.getElementById('next-step-btn').innerText = "Odpovědět (Krok 1)";
    }

    function nextStep() {
        const g = document.getElementById('gender-switch').value;
        const qPart = document.getElementById('question-part');
        const answerDiv = document.getElementById('answer-display');
        const nextBtn = document.getElementById('next-step-btn');
        const day = days[dayIdx];
        const endings = { 'M': 'l', 'F': 'la', 'N': 'lo', 'Pl': 'li', 'PlFem': 'ly', 'PlN': 'la' };

        if (step === 1) {
            answerDiv.innerText = day.charAt(0).toUpperCase() + day.slice(1);
            let nextAux = (g === 'PlN') ? "(__)" : (g.startsWith('Pl') ? "jsme" : "jsem");
            nextBtn.innerText = `Krok 2 (+ ${nextAux})`;
            step = 2;
        } 
        else if (step === 2) {
            const aux = (g === 'PlN') ? '<span style="color:#999">__</span>' : (g.startsWith('Pl') ? "jsme" : "jsem");
            answerDiv.innerHTML += ` <span class="blue-bold">${aux}</span>`;
            nextBtn.innerText = "Krok 3 (příčestí minulé)";
            step = 3;
        } 
        else if (step === 3) {
            let parts = currentVerb.split(/\s+/);
            let reflex = parts.length > 1 ? parts[1] : "";
            let finalStem = currentVerbStem;
            if (finalStem.endsWith("še") && g !== 'M') finalStem = finalStem.slice(0, -1);
            
            let pastParticiple = `${finalStem}<span class="blue-bold">${endings[g]||'l'}</span>`;
            if (reflex) pastParticiple += ` ${reflex}`;
            
            answerDiv.innerHTML += ` ${pastParticiple}.`;
            speakCzech(answerDiv.innerText);
            nextBtn.innerText = `Otázka: ${currentQuestionWord.cz} (${currentQuestionWord.en})`;
            step = 4;
        }
        else if (step === 4) {
            let auxQ = (g === 'PlN') ? '' : (g.startsWith('Pl') ? "jste" : "jsi");
            let parts = currentVerb.split(/\s+/);
            let reflex = parts.length > 1 ? parts[1] : "";
            let finalStem = currentVerbStem;
            if (finalStem.endsWith("še") && g !== 'M') finalStem = finalStem.slice(0, -1);
            
            let fullVerbForm = `${finalStem}${endings[g]||'l'}`;
            if (reflex) fullVerbForm += ` ${reflex}`;
            
            qPart.innerHTML = `<span class="blue-bold">${currentQuestionWord.cz.charAt(0).toUpperCase() + currentQuestionWord.cz.slice(1)}</span> ${auxQ} ${fullVerbForm} ${day}? &nbsp; →`;
            answerDiv.innerHTML = day.charAt(0).toUpperCase() + day.slice(1);
            
            let nextAux = (g === 'PlN') ? "(__)" : (g.startsWith('Pl') ? "jsme" : "jsem");
            nextBtn.innerText = `Krok 6 (+ ${nextAux})`;
            step = 5;
        }
        else if (step === 5) {
            const aux = (g === 'PlN') ? '<span style="color:#999">__</span>' : (g.startsWith('Pl') ? "jsme" : "jsem");
            answerDiv.innerHTML += ` <span class="blue-bold">${aux}</span>`;
            nextBtn.innerText = "Krok 7 (příčestí)";
            step = 6;
        }
        else if (step === 6) {
            let parts = currentVerb.split(/\s+/);
            let reflex = parts.length > 1 ? parts[1] : "";
            let finalStem = currentVerbStem;
            if (finalStem.endsWith("še") && g !== 'M') finalStem = finalStem.slice(0, -1);
            
            let pastParticiple = `${finalStem}<span class="blue-bold">${endings[g]||'l'}</span>`;
            if (reflex) pastParticiple += ` ${reflex}`;
            
            answerDiv.innerHTML += ` ${pastParticiple}`;
            nextBtn.innerText = "Krok 8 (odpověď)";
            step = 7;
        }
        else if (step === 7) {
            const ans = currentQuestionWord.answer;
            const bold = currentQuestionWord.boldPart;
            const formattedAns = bold ? ans.replace(bold, `<span class="blue-bold">${bold}</span>`) : ans;
            
            answerDiv.innerHTML += ` ${formattedAns}.`;
            speakCzech(answerDiv.innerText);
            nextBtn.innerText = "Další sloveso";
            step = 8;
        }
        else {
            document.getElementById('log-content').innerHTML += `<div><strong>${qPart.innerText}</strong> ${answerDiv.innerHTML}</div>`;
            dayIdx = (dayIdx + 1) % days.length;
            
            document.getElementById('lesson-section').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'none';
            document.getElementById('input-section').style.display = 'block';
            
            document.getElementById('verb-input').value = "";
            document.getElementById('verb-info-display').innerHTML = "";
            document.getElementById('verb-status-badge').innerHTML = "";
            step = 0; 
        }
    }

    function speakCzech(text) {
        if (!document.getElementById('audio-toggle').checked || !window.speechSynthesis) return;
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'cs-CZ';
        window.speechSynthesis.cancel(); 
        window.speechSynthesis.speak(utterance);
    }

    const chars = ['ž','š','č','ř','ď','ť','ň','ě','á','é','í','ý','ó','ú','ů'];
    const picker = document.getElementById('char-picker');
    chars.forEach(char => {
        let btn = document.createElement('span');
        btn.className = 'char-btn';
        btn.innerText = char;
        btn.onclick = () => {
            const input = document.getElementById('verb-input');
            input.setRangeText(char, input.selectionStart, input.selectionEnd, 'end');
            input.focus();
            checkInputForButton();
        };
        picker.appendChild(btn);
    });

    initDatabase();
</script>
