        ]}

    const days = ["v neděli", "v pondělí", "v úterý", "ve středu", "ve čtvrtek", "v pátek", "v sobotu", "o víkendu", "minulý týden"];

    async function initDatabase() {
        try {
            const sqlPromise = initSqlJs({ locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/${file}` });
            const dataPromise = fetch('../VocabSQL_database/czech_master.db').then(res => res.arrayBuffer());
            const [SQL, buf] = await Promise.all([sqlPromise, dataPromise]);
            db = new SQL.Database(new Uint8Array(buf));
            
            try {
                const mapRes = await fetch('verb_mappings.json');
                if(mapRes.ok) {
                    verbMappings = await mapRes.json();
                } else {
                    loadFromLocalStorageFallback();
                }
            } catch(e) {
                loadFromLocalStorageFallback();
            }
            buildAdminGridUI();
        } catch (err) { console.error("Database failed:", err); }
    }

    function loadFromLocalStorageFallback() {
        const localData = localStorage.getItem('local_verb_mappings');
        if (localData) {
            verbMappings = JSON.parse(localData);
        }
    }

    function toggleAdminMode() {
        isAdminMode = document.getElementById('admin-mode-checkbox').checked;
        document.getElementById('export-btn').style.display = isAdminMode ? 'inline-block' : 'none';
        if (!isAdminMode) document.getElementById('admin-panel').style.display = 'none';
        else if (currentVerb) showAdminControlsForVerb(currentVerb);
        updateVerbBadge();
    }

    function buildAdminGridUI() {
        const container = document.getElementById('admin-questions-list');
        container.innerHTML = "";
        
        Object.keys(questionMap).forEach(key => {
            const row = document.createElement('div');
            row.className = 'admin-question-row';
            row.id = `row-wrapper-${key}`;
            
            let optionsHtml = "";
            for (let i = 0; i < 7; i++) {
                optionsHtml += `
                    <div class="option-edit-box" id="box-opt-${key}-${i}">
                        <label>
                            <span>Varianta ${i + 1}:</span>
                            <input type="checkbox" class="opt-enable-check" id="check-opt-${key}-${i}" checked onchange="updateBoxStyle('${key}', ${i})">
                        </label>
                        <input type="text" id="input-ans-${key}-${i}" placeholder="Základ textu">
                        <input type="text" id="input-bold-${key}-${i}" placeholder="Zvýrazněný konec (bold)">
                    </div>
                `;
            }

            row.innerHTML = `
                <div class="admin-row-header" onclick="toggleAccordion('${key}')">
                    <div class="admin-header-left" onclick="event.stopPropagation()">
                        <input type="checkbox" id="admin-q-${key}" checked>
                        <strong>${key}</strong> <span style="color:#777; font-size:14px;">(${questionMap[key].en})</span>
                    </div>
                    <span class="toggle-arrow">▼</span>
                </div>
                <div class="admin-dropdown-content" id="dropdown-${key}">
                    <div class="admin-options-grid">
                        ${optionsHtml}
                    </div>
                </div>
            `;
            container.appendChild(row);
        });
    }

    function updateBoxStyle(key, i) {
        const check = document.getElementById(`check-opt-${key}-${i}`);
        const box = document.getElementById(`box-opt-${key}-${i}`);
        if(check.checked) {
            box.classList.remove('disabled-opt');
        } else {
            box.classList.add('disabled-opt');
        }
    }

    function toggleAccordion(key) {
        const wrapper = document.getElementById(`row-wrapper-${key}`);
        const content = document.getElementById(`dropdown-${key}`);
        if (content.style.display === "block") {
            content.style.display = "none";
            wrapper.classList.remove("open");
        } else {
            content.style.display = "block";
            wrapper.classList.add("open");
        }
    }

    function showAdminControlsForVerb(verb) {
        if (!isAdminMode) return;
        document.getElementById('admin-panel').style.display = 'block';
        document.getElementById('admin-verb-title').innerText = verb;
        
        const config = verbMappings[verb] || {};
        
        Object.keys(questionMap).forEach(key => {
            const check = document.getElementById(`admin-q-${key}`);
            
            if (config.allowed_questions) {
                check.checked = config.allowed_questions.includes(key);
            } else {
                check.checked = true; 
            }

            for (let i = 0; i < 7; i++) {
                const ansInput = document.getElementById(`input-ans-${key}-${i}`);
                const boldInput = document.getElementById(`input-bold-${key}-${i}`);
                const optCheck = document.getElementById(`check-opt-${key}-${i}`);
                
                if (config.custom_answers && config.custom_answers[key] && config.custom_answers[key][i]) {
                    const savedOpt = config.custom_answers[key][i];
                    ansInput.value = savedOpt.ans || "";
                    boldInput.value = savedOpt.bold || "";
                    optCheck.checked = (savedOpt.enabled !== false); 
                } else {
                    const defOpt = questionMap[key].options[i];
                    ansInput.value = defOpt.ans;
                    boldInput.value = defOpt.bold;
                    optCheck.checked = true;
                }
                updateBoxStyle(key, i);
            }
        });
    }

    function saveLocalMapping() {
        if (!currentVerb) return;
        let allowed_questions = [];
        let custom_answers = {};
        
        Object.keys(questionMap).forEach(key => {
            const check = document.getElementById(`admin-q-${key}`);
            if (check.checked) {
                allowed_questions.push(key);
            }

            let hasChanges = false;
            let questionArray = [];

            for (let i = 0; i < 7; i++) {
                const ansVal = document.getElementById(`input-ans-${key}-${i}`).value.trim();
                const boldVal = document.getElementById(`input-bold-${key}-${i}`).value.trim();
                const isEnabled = document.getElementById(`check-opt-${key}-${i}`).checked;
                const defOpt = questionMap[key].options[i];

                questionArray.push({ ans: ansVal, bold: boldVal, enabled: isEnabled });

                if (ansVal !== defOpt.ans || boldVal !== defOpt.bold || isEnabled === false) {
                    hasChanges = true; 
                }
            }

            if (hasChanges) {
                custom_answers[key] = questionArray;
            }
        });

        verbMappings[currentVerb] = {
            approved: true,
            allowed_questions: allowed_questions,
            custom_answers: Object.keys(custom_answers).length > 0 ? custom_answers : undefined
        };

        if (!verbMappings[currentVerb].custom_answers) {
            delete verbMappings[currentVerb].custom_answers;
        }

        localStorage.setItem('local_verb_mappings', JSON.stringify(verbMappings));
        updateVerbBadge();
        alert(`Uloženo! Konfigurace, přepsané i vypnuté odpovědi pro sloveso "${currentVerb}" uloženy.`);
    }

    function updateVerbBadge() {
        const badgeSpan = document.getElementById('verb-status-badge');
        if (!currentVerb || !isAdminMode) {
            badgeSpan.innerHTML = "";
            return;
        }
        if (verbMappings[currentVerb] && verbMappings[currentVerb].approved) {
            badgeSpan.innerHTML = `<span class="badge-status status-approved">Schváleno</span>`;
        } else {
            badgeSpan.innerHTML = `<span class="badge-status status-unapproved">Neschváleno</span>`;
        }
    }

    function exportJsonFile() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(verbMappings, null, 2));
        const downloadAnchor = document.createElement('a');
        downloadAnchor.setAttribute("href", dataStr);
        downloadAnchor.setAttribute("download", "verb_mappings.json");
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click();
        downloadAnchor.remove();
    }

    function handleGenderChange() {
        const select = document.getElementById('gender-switch');
        if (step !== 0) {
            alert("Nemůžeš měnit rod během probíhající lekce!");
            select.value = lastGender; 
            return;
        }
        lastGender = select.value;
        document.getElementById('input-section').style.display = 'block';
        document.getElementById('verb-input').focus();
    }

    function isValidVerb(val) {
        return /t$|t\s+se$|t\s+si$/.test(val.trim().toLowerCase());
    }

    function checkInputForButton() {
        const input = document.getElementById('verb-input');
        const btn = document.getElementById('start-btn');
        btn.disabled = !isValidVerb(input.value);
    }

    async function getRandomVerbFromDB() {
        if (!db) return;
        const lang = localStorage.getItem("selectedLanguage") || "en";
        const langCol = "trans_" + (lang === "cs" ? "en" : lang);
        
        try {
            let query = `SELECT lemma, synonym, vid_pair, ${langCol}, pos 
                         FROM words 
                         WHERE (pos = 'verb' OR pos LIKE 'verb,%' OR pos LIKE '%,verb') 
                         AND level = 'A1' 
                         AND lemma LIKE '%t'`;
                         
            if (!isAdminMode) {
                const approvedVerbs = Object.keys(verbMappings).filter(k => verbMappings[k].approved === true);
                if (approvedVerbs.length > 0) {
                    const dynamicList = approvedVerbs.map(v => `'${v.replace(/'/g, "''")}'`).join(",");
                    query += ` AND lemma IN (${dynamicList})`;
                } else {
                    document.getElementById('translation-prompt').innerText = "Žrádná schválená slovesa v konfiguraci.";
                    return;
                }
            }
            
            query += ` ORDER BY RANDOM() LIMIT 1`;
            const res = db.exec(query);
            
            if (res[0]) {
                const [lemma, synonym, vid_pair, translation, pos] = res[0].values[0];
                
                validAnswers = [];
                if (lemma) validAnswers.push(lemma.toLowerCase().trim());
                if (synonym) synonym.split(',').forEach(s => { let c = s.toLowerCase().trim(); if (c) validAnswers.push(c); });
                if (vid_pair) vid_pair.split(/[,/]/).forEach(v => { let c = v.toLowerCase().trim(); if (c) validAnswers.push(c); });

                document.getElementById('translation-prompt').innerText = `Přelož: ${translation}`;
                const input = document.getElementById('verb-input');
                input.value = lemma; 
                input.focus();
                checkInputForButton();
            }
        } catch (e) { console.error("Random verb error:", e); }
    }

    async function startLesson() {
        const input = document.getElementById('verb-input');
        let val = input.value.trim().toLowerCase();
        
        if (validAnswers.length > 0 && !validAnswers.includes(val)) {
            alert(`Špatně. Příklady správných odpovědí: ${validAnswers.join(", ")}`);
            return;
        }

        if (!isValidVerb(val)) return;
        
        if (!isAdminMode && (!verbMappings[val] || !verbMappings[val].approved)) {
            alert("Toto sloveso zatím nebylo schváleno k výuce. / this Verb has not yet been approved");
            return;
        }

        document.getElementById('translation-prompt').innerText = "";
        validAnswers = []; 
        currentVerb = val;
        
        let baseVerb = val.split(" ")[0];
        if (baseVerb.endsWith("nout")) {
            currentVerbStem = baseVerb.slice(0, -4);
        } else {
            currentVerbStem = baseVerb.replace(/t$/, '');
        } 
        
        isCurrentlyIrregular = false;
        if (db) {
            try {
                const stmt = db.prepare("SELECT is_irr, irr_type FROM words WHERE lemma = ? AND pos LIKE '%verb%' LIMIT 1");
                stmt.bind([val]);
                if (stmt.step()) {
                    const row = stmt.get();
                    if (row[0] === 1 && [1, 2, 5].includes(row[1])) {
                        const overStmt = db.prepare("SELECT past_participle FROM overrides WHERE form_key = ? LIMIT 1");
                        overStmt.bind([val]);
                        if (overStmt.step()) {
                            isCurrentlyIrregular = true;
                            let fullPast = overStmt.get()[0].split(" ")[0];
                            currentVerbStem = fullPast.endsWith('l') ? fullPast.slice(0, -1) : fullPast;
                        }
                        overStmt.free();
                    }
                }
                stmt.free();
                
                let allowedKeys = Object.keys(questionMap);
                let activeConfig = verbMappings[val];
                if (activeConfig && activeConfig.allowed_questions && activeConfig.allowed_questions.length > 0) {
                    allowedKeys = activeConfig.allowed_questions;
                }
                
                const randomKey = allowedKeys[Math.floor(Math.random() * allowedKeys.length)];
                
                // NAČTENÍ A DYNAMICKÝ FILTR AKTIVNÍCH MOŽNOSTÍ (OPTIONS)
                let activeOptions = [];
                
                if (activeConfig && activeConfig.custom_answers && activeConfig.custom_answers[randomKey]) {
                    // Projdeme uložené nastavení z JSONu a vezmeme jen ty s enabled !== false
                    activeConfig.custom_answers[randomKey].forEach(opt => {
                        if (opt.enabled !== false) {
                            activeOptions.push(opt);
                        }
                    });
                } else {
                    // Pokud nemá sloveso žádné změny, automaticky jsou povoleny všechny výchozí možnosti
                    activeOptions = [...questionMap[randomKey].options];
                }

                // Bezpečnostní pojistka: kdyby učitel odškrtal úplně všechno, fallbackneme na kompletní default
                if (activeOptions.length === 0) {
                    activeOptions = [...questionMap[randomKey].options];
                }

                // Vylosujeme náhodný prvek pouze z aktivních (zaškrtnutých) možností
                let selectedOption = activeOptions[Math.floor(Math.random() * activeOptions.length)];
                
                currentQuestionWord = { 
                    cz: randomKey, 
                    en: questionMap[randomKey].en, 
                    answer: selectedOption.ans, 
                    boldPart: selectedOption.bold 
                };
            } catch (e) { console.error(e); }
        }

        updateVerbBadge();
        showAdminControlsForVerb(currentVerb);
        document.getElementById('input-section').style.display = 'none';
        document.getElementById('lesson-section').style.display = 'block';
        document.getElementById('verb-info-display').innerHTML = " | " + val;
        showQuestion();
    }

    function showQuestion() {
        step = 1;
        const day = days[dayIdx];
        const g = document.getElementById('gender-switch').value;
        const endings = { 'M': 'l', 'F': 'la', 'N': 'lo', 'Pl': 'li', 'PlFem': 'ly', 'PlN': 'la' };
        let aux = (g === 'PlN') ? '__' : (g.startsWith('Pl') ? "jste" : "jsi");
        document.getElementById('sentence-display').innerHTML = `Co <span class="blue-bold">${aux}</span> děla<span class="blue-bold">${endings[g]||'l'}</span> ${day}?`;
        document.getElementById('answer-display').innerText = "";
        document.getElementById('question-part').innerText = "";
        document.getElementById('next-step-btn').innerText = "Odpovědět (Krok 1)";
    }

    function nextStep() {
        const g = document.getElementById('gender-switch').value;
        const qPart = document.getElementById('question-part');
        const answerDiv = document.getElementById('answer-display');
        const nextBtn = document.getElementById('next-step-btn');
        const day = days[dayIdx];
        const endings = { 'M': 'l', 'F': 'la', 'N': 'lo', 'Pl': 'li', 'PlFem': 'ly', 'PlN': 'la' };

        if (step === 1) {
            answerDiv.innerText = day.charAt(0).toUpperCase() + day.slice(1);
            step = 2;
        } else if (step === 2) {
            const aux = (g === 'PlN') ? '__' : (g.startsWith('Pl') ? "jsme" : "jsem");
            answerDiv.innerHTML += ` <span class="blue-bold">${aux}</span>`;
            step = 3;
        } else if (step === 3) {
            let parts = currentVerb.split(/\s+/);
            let pastParticiple = `${currentVerbStem}<span class="blue-bold">${endings[g]||'l'}</span>${parts[1] ? ' ' + parts[1] : ''}`;
            answerDiv.innerHTML += ` ${pastParticiple}.`;
            speakCzech(answerDiv.innerText);
            nextBtn.innerText = `Otázka: ${currentQuestionWord.cz}`;
            step = 4;
        } else if (step === 4) {
            let auxQ = (g === 'PlN') ? '' : (g.startsWith('Pl') ? "jste" : "jsi");
            let parts = currentVerb.split(/\s+/);
            qPart.innerHTML = `<span class="blue-bold">${currentQuestionWord.cz.charAt(0).toUpperCase() + currentQuestionWord.cz.slice(1)}</span> ${auxQ} ${currentVerbStem}${endings[g]||'l'}${parts[1] ? ' ' + parts[1] : ''} ${day}? →`;
            answerDiv.innerHTML = day.charAt(0).toUpperCase() + day.slice(1);
            step = 5;
        } else if (step === 5) {
            const aux = (g === 'PlN') ? '__' : (g.startsWith('Pl') ? "jsme" : "jsem");
            answerDiv.innerHTML += ` <span class="blue-bold">${aux}</span>`;
            step = 6;
        } else if (step === 6) {
            let parts = currentVerb.split(/\s+/);
            answerDiv.innerHTML += ` ${currentVerbStem}<span class="blue-bold">${endings[g]||'l'}</span>${parts[1] ? ' ' + parts[1] : ''}`;
            step = 7;
        } else if (step === 7) {
            answerDiv.innerHTML += ` ${currentQuestionWord.answer}<span class="blue-bold">${currentQuestionWord.boldPart}</span>.`;
            speakCzech(answerDiv.innerText);
            nextBtn.innerText = "Další sloveso";
            step = 8;
        } else {
            document.getElementById('log-content').innerHTML += `<div><strong>${qPart.innerText}</strong> ${answerDiv.innerHTML}</div>`;
            dayIdx = (dayIdx + 1) % days.length;
            document.getElementById('lesson-section').style.display = 'none';
            document.getElementById('input-section').style.display = 'block';
            document.getElementById('verb-input').value = "";
            step = 0; 
        }
    }

    function speakCzech(text) {
        if (!document.getElementById('audio-toggle').checked || !window.speechSynthesis) return;
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'cs-CZ';
        window.speechSynthesis.speak(utterance);
    }

    const chars = ['ž','š','č','ř','ď','ť','ň','ě','á','é','í','ý','ó','ú','ů'];
    chars.forEach(char => {
        let btn = document.createElement('span');
        btn.className = 'char-btn';
        btn.innerText = char;
        btn.onclick = () => {
            const input = document.getElementById('verb-input');
            input.setRangeText(char, input.selectionStart, input.selectionEnd, 'end');
            input.focus();
            checkInputForButton();
        };
        document.getElementById('char-picker').appendChild(btn);
    });

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            if (document.getElementById('input-section').style.display !== 'none') {
                if (!document.getElementById('start-btn').disabled) startLesson();
            } else if (document.getElementById('lesson-section').style.display !== 'none') {
                nextStep();
            }
        }
    });

    initDatabase();
</script>
