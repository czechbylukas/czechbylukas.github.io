<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Tool Teacher | Past Tense Practice</title>
    
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/sql-wasm.js"></script>

    <style>
        body { font-family: 'Arial', sans-serif; display: flex; flex-direction: column; margin: 0; min-height: 100vh; background-color: #f0f4ff; }
        header { background: white; padding: 20px; border-bottom: 2px solid #007bff; text-align: center; }
        .main-layout { display: flex; flex-direction: column; align-items: center; padding: 20px; flex: 1; }
        
        #student-view { width: 100%; max-width: 800px; text-align: center; }
        #input-section { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        #verb-input { padding: 15px; font-size: 24px; border: 2px solid #007bff; border-radius: 8px; width: 300px; outline: none; }
        #verb-input.error { border-color: red; background-color: #fff0f0; }

        #sentence-display { font-size: 36px; margin-bottom: 20px; color: #333; min-height: 50px; }
        #answer-display { font-size: 40px; color: #28a745; margin-bottom: 40px; min-height: 60px; font-weight: bold; }
        
        .blue-bold { color: #007bff !important; font-weight: bold !important; }
        .btn-main { padding: 15px 30px; font-size: 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 8px; transition: 0.2s; }
        .btn-main:disabled { opacity: 0.5; cursor: not-allowed; }
        
        #history-log { width: 100%; max-width: 600px; margin-top: 30px; text-align: left; background: white; padding: 15px; border-radius: 10px; border: 1px solid #ddd; }
        #history-log div { margin-bottom: 8px; padding-bottom: 5px; border-bottom: 1px dotted #ccc; font-size: 18px; }

        .gender-box { background: #eef4ff; padding: 15px; border-radius: 10px; border: 1px solid #007bff33; margin-bottom: 20px; display: inline-block; }
        .char-btn { display: inline-block; min-width: 35px; padding: 10px; background: #eee; border: 1px solid #ccc; border-radius: 5px; cursor: pointer; margin: 2px; font-weight: bold; }
        .char-btn:hover { background: #007bff; color: white; }

        #lesson-section { display: none; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0; color: #007bff;">Past Tense Practice (Minulý čas)</h1>
</header>

<div class="main-layout">
    <div id="student-view">
        
        <div class="gender-box">
            <label style="font-weight: bold; margin-right: 10px;">I am:</label>
            <select id="gender-switch" onchange="enableInput()" style="padding: 10px; font-size: 18px; border-radius: 8px; border: 2px solid #007bff;">
                <option value="" disabled selected>Vyber...</option>
                <option value="M">Male (L)</option>
                <option value="F">Female (LA)</option>
                <option value="N">Neutral (LO)</option>
                <option value="Pl">Plural, M (LI)</option>
                <option value="PlFem">Plural, F (LY)</option>
                <option value="PlN">Plural, N (LA)</option>
            </select>
            <span id="verb-info-display" style="margin-left: 20px; font-size: 22px; color: #333;"></span>
        </div>

 <div id="input-section" style="display: none;">
    <p>Napiš infinitiv slovesa:</p>
    <input type="text" id="verb-input" 
           placeholder="např. dělat..." 
           onkeyup="checkInputForButton()" 
           autocomplete="off" 
           spellcheck="false">
    
    <div id="char-picker" style="margin-top: 15px;"></div>
            <br><br>
            <button id="start-btn" class="btn-main" onclick="startLesson()" disabled>
                Začít lekci (Enter)
            </button>
        </div>

        <div id="lesson-section">
            <div id="sentence-display"></div>
            <div id="answer-display"></div>
            <button id="next-step-btn" class="btn-main" onclick="nextStep()">Odpovědět (Krok 1)</button>
        </div>

        <div id="history-log">
            <h3>Historie lekce:</h3>
            <div id="log-content"></div>
        </div>
    </div>
</div>

<script>
    // --- DATABASE & STATE ---
    let db = null;
    let currentVerb = "";
    let currentVerbStem = "";
    let step = 0;
    let dayIdx = 0;
    const days = ["v neděli", "v pondělí", "v úterý", "ve středu", "ve čtvrtek", "v pátek", "v sobotu", "o víkendu", "minulý týden", "minulý rok", "loni"];

    // Initialize Database
    async function initDatabase() {
        try {
            const sqlPromise = initSqlJs({ locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/${file}` });
            const dataPromise = fetch('../VocabSQL_database/czech_master.db').then(res => res.arrayBuffer());
            const [SQL, buf] = await Promise.all([sqlPromise, dataPromise]);
            db = new SQL.Database(new Uint8Array(buf));
            console.log("Database ready.");
        } catch (err) {
            console.error("Database failed to load:", err);
        }
    }

    // Step 1: Gender selection enables input
    function enableInput() {
        document.getElementById('input-section').style.display = 'block';
        document.getElementById('verb-input').focus();
    }

    // Step 2: Validate input format
    function checkInputForButton() {
        const input = document.getElementById('verb-input');
        const btn = document.getElementById('start-btn');
        const val = input.value.trim().toLowerCase();
        const isValid = /t$|t\s+se$|t\s+si$/.test(val);
        btn.disabled = !isValid;
    }

    // Step 3: Start Practice
    async function startLesson() {
        const input = document.getElementById('verb-input');
        const val = input.value.trim().toLowerCase();
        
        currentVerb = val;
        currentVerbStem = val.split(" ")[0].replace(/t$/, ''); // Default stem
        
        // 1. Move the variable declaration OUTSIDE the try block
        let verbExists = false; 

        // Database lookup for irregulars
        if (db) {
            try {
                const stmt = db.prepare("SELECT is_irr, irr_type FROM words WHERE lemma = ? AND pos LIKE '%verb%' LIMIT 1");
                stmt.bind([val]);
                
                if (stmt.step()) {
                    verbExists = true; // Now this updates the variable outside
                    const row = stmt.get();
                    if (row[0] === 1 && [1, 2, 5].includes(row[1])) {
                        const overStmt = db.prepare("SELECT past_participle FROM overrides WHERE form_key = ? LIMIT 1");
                        overStmt.bind([val]);
                        if (overStmt.step()) {
                            let fullPast = overStmt.get()[0].split(" ")[0];
                            currentVerbStem = fullPast.endsWith('l') ? fullPast.slice(0, -1) : fullPast;
                        }
                        overStmt.free();
                    }
                }
                stmt.free();
            } catch (e) { 
                console.error("DB Error:", e); 
            }
        }

        // 2. Set the global verification flag (Now it can see verbExists!)
        window.currentVerbVerified = verbExists;

        if (!verbExists) {
            const proceed = confirm(`I do not know the verb "${val}". Proceed?`);
            if (!proceed) return;
        }

        document.getElementById('input-section').style.display = 'none';
        document.getElementById('lesson-section').style.display = 'block';
        
        let displayHtml = val.replace(/t(\s|$)/, '<b style="color:red">t</b>$1');
        document.getElementById('verb-info-display').innerHTML = " | " + displayHtml;
        
        showQuestion();
    }

    // Always show "Co jsi dělal..." using 'dělat'
    function showQuestion() {
        step = 1;
        const day = days[dayIdx];
        const g = document.getElementById('gender-switch').value;
        const endings = { 'M': 'l', 'F': 'la', 'N': 'lo', 'Pl': 'li', 'PlFem': 'ly', 'PlN': 'la' };
        const end = endings[g] || 'l';
        
        let aux = (g === 'PlN') ? '<span style="color:#999">__</span>' : (g.startsWith('Pl') ? "jste" : "jsi");

        document.getElementById('sentence-display').innerHTML = 
            `Co <span class="blue-bold">${aux}</span> děla<span class="blue-bold">${end}</span> ${day}?`;
        
        document.getElementById('answer-display').innerText = "";
        document.getElementById('next-step-btn').innerText = "Odpovědět (Krok 1)";
    }


    function nextStep() {
        const day = days[dayIdx];
        const g = document.getElementById('gender-switch').value;
        const answerDiv = document.getElementById('answer-display');
        const nextBtn = document.getElementById('next-step-btn');

        if (step === 1) {
            answerDiv.innerText = day.charAt(0).toUpperCase() + day.slice(1);
            let nextAux = (g === 'PlN') ? "(__)" : (g.startsWith('Pl') ? "jsme" : "jsem");
            nextBtn.innerText = `Krok 2 (+ ${nextAux})`;
            step = 2;
        } 
        else if (step === 2) {
            const aux = (g === 'PlN') ? '<span style="color:#999">__</span>' : (g.startsWith('Pl') ? "jsme" : "jsem");
            answerDiv.innerHTML += ` <span class="blue-bold">${aux}</span>`;
            nextBtn.innerText = "Krok 3 (past participle)";
            step = 3;
        } 
        else if (step === 3) {
            let parts = currentVerb.split(/\s+/);
            let reflex = parts.length > 1 ? parts[1] : "";
            const endings = { 'M': 'l', 'F': 'la', 'N': 'lo', 'Pl': 'li', 'PlFem': 'ly', 'PlN': 'la' };
            const end = endings[g] || 'l';

            let finalStem = currentVerbStem || "";
            if (finalStem.endsWith("še") && g !== 'M') finalStem = finalStem.slice(0, -1);

            if (reflex !== "") {
                answerDiv.innerHTML += ` <span class="blue-bold">${reflex}</span> ${finalStem}<span class="blue-bold">${end}</span>.`;
            } else {
                answerDiv.innerHTML += ` ${finalStem}<span class="blue-bold">${end}</span>.`;
            }
            nextBtn.innerText = "Další sloveso";
            step = 4;
        } 
        else {
            // 1. Create the verification note if the verb wasn't in the DB
            const note = (window.currentVerbVerified === false) 
                ? `<br><small style="color:red; font-style:italic;">I do not know this verb, so I could not verify.</small>` 
                : "";

            // 2. Add to log (Only once!)
            document.getElementById('log-content').innerHTML += `<div>${answerDiv.innerHTML}${note}</div>`;
            
            // 3. Reset for next verb
            dayIdx = (dayIdx + 1) % days.length;
            document.getElementById('lesson-section').style.display = 'none';
            document.getElementById('input-section').style.display = 'block';
            document.getElementById('verb-input').value = "";
            document.getElementById('verb-info-display').innerHTML = "";
            document.getElementById('verb-input').focus();
            step = 0;
        }
    }

    // Character Picker
    const chars = ['ž','š','č','ř','ď','ť','ň','ě','á','é','í','ý','ó','ú','ů'];
    const picker = document.getElementById('char-picker');
    chars.forEach(char => {
        let btn = document.createElement('span');
        btn.className = 'char-btn';
        btn.innerText = char;
        btn.onclick = () => {
            const input = document.getElementById('verb-input');
            const start = input.selectionStart;
            const end = input.selectionEnd;
            input.setRangeText(char, start, end, 'end');
            input.focus();
            checkInputForButton();
        };
        picker.appendChild(btn);
    });

    initDatabase();


    // Global Enter key listener
document.addEventListener('keypress', function (e) {
    if (e.key === 'Enter') {
        const lessonSection = document.getElementById('lesson-section');
        const startBtn = document.getElementById('start-btn');
        const inputSection = document.getElementById('input-section');

        // Case 1: If we are in the lesson, trigger the Next Step button
        if (window.getComputedStyle(lessonSection).display !== 'none') {
            nextStep();
        } 
        // Case 2: If we are at the start and the button is enabled, start the lesson
        else if (window.getComputedStyle(inputSection).display !== 'none' && !startBtn.disabled) {
            startLesson();
        }
    }
});



</script>

</body>
</html>
