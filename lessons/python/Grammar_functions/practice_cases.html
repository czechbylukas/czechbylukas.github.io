<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Czech Grammar: Noun Practice</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f8fafc; display: flex; justify-content: center; padding: 40px; }
        .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; border: 1px solid #e2e8f0; }
        .token { color: #64748b; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        h2 { color: #1e293b; margin: 15px 0; }
        input { width: 100%; padding: 14px; margin: 15px 0; border: 2px solid #f1f5f9; border-radius: 12px; font-size: 16px; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: #3b82f6; outline: none; background: #fff; }
        button { background: #1e293b; color: white; border: none; padding: 14px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: 600; font-size: 16px; transition: 0.2s; }
        button:hover { background: #334155; }
        button:disabled { background: #cbd5e1; }
        .step { display: none; margin-top: 25px; padding-top: 25px; border-top: 1px solid #f1f5f9; }
        .feedback { margin-top: 15px; font-weight: bold; }
        .correct { color: #10b981; }
        .wrong { color: #ef4444; }
        #loader { display: none; color: #3b82f6; font-size: 14px; margin-top: 10px; font-weight: 500; }
    </style>
</head>
<body>

<div class="card">
    <div id="quiz-container">
        <span class="token">Translate to Czech</span>
        <h2 id="target-word">...</h2>
        <input type="text" id="trans-input" placeholder="Enter translation..." autocomplete="off">
        <button id="btn-check" onclick="checkTranslation()">Continue →</button>
        <div id="loader">Fetching Grammar Data...</div>
    </div>

    <div id="grammar-step" class="step">
        <span class="token">Decline the Noun</span>
        <p id="case-prompt" style="font-size: 18px; color: #1e293b; font-weight: 500;"></p>
        <input type="text" id="grammar-input" placeholder="Type the singular form..." autocomplete="off">
        <button onclick="verifyGrammar()">Check Answer</button>
        <div id="feedback" class="feedback"></div>
    </div>
</div>

<script>
    const words = {
        "woman": "žena",
        "pig": "prase",
        "grandma": "babka",
        "husite": "husita",
        "man": "muž"
    };

    let targetEn = "";
    let targetCz = "";
    let declensionData = [];
    let activeCase = null;

    function start() {
        const keys = Object.keys(words);
        targetEn = keys[Math.floor(Math.random() * keys.length)];
        document.getElementById('target-word').innerText = targetEn;
    }

    async function checkTranslation() {
        const val = document.getElementById('trans-input').value.trim().toLowerCase();
        if (val === words[targetEn]) {
            targetCz = val;
            document.getElementById('btn-check').disabled = true;
            document.getElementById('loader').style.display = 'block';
            await loadGrammar(targetCz);
        } else {
            alert("Try again! Check your spelling (accents matter).");
        }
    }

    async function loadGrammar(word) {
        // We use encodeURIComponent to handle 'ž' properly
        const url = `https://lessons-487913.ey.r.appspot.com/scrape_declension?word=${encodeURIComponent(word)}`;
        
        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error("404 - Word Not Found on Wiki");
            
            declensionData = await response.json();
            
            // CONSOLE LOG REQUESTED: Log all forms in Singular
            console.log(`%c GRAMMAR ENGINE: ${word.toUpperCase()} `, 'background: #1e293b; color: #fff; padding: 5px;');
            declensionData.forEach(item => {
                console.log(`[Singular] ${item.case}: ${item.singular}`);
            });

            showGrammarChallenge();
        } catch (e) {
            console.error(e);
            alert("Error: The scraper couldn't find this word. It might be missing from Wiktionary or the URL encoding failed.");
            document.getElementById('btn-check').disabled = false;
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }

    function showGrammarChallenge() {
        // Pick a random case except Nominative (which is Step 1)
        const validOptions = declensionData.filter(row => !row.case.includes("1."));
        activeCase = validOptions[Math.floor(Math.random() * validOptions.length)];

        document.getElementById('case-prompt').innerText = `Write the "${activeCase.case}" form:`;
        document.getElementById('grammar-step').style.display = 'block';
        document.getElementById('grammar-input').focus();
    }

    function verifyGrammar() {
        const input = document.getElementById('grammar-input').value.trim().toLowerCase();
        const correctOnes = activeCase.singular.toLowerCase().split('/').map(s => s.trim());
        const feedback = document.getElementById('feedback');

        if (correctOnes.includes(input)) {
            feedback.innerHTML = "✓ Correct! Well done.";
            feedback.className = "feedback correct";
            setTimeout(() => location.reload(), 2000);
        } else {
            feedback.innerHTML = `× Incorrect. Expected: ${activeCase.singular}`;
            feedback.className = "feedback wrong";
        }
    }

    // Enter key support
    document.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            if (document.getElementById('grammar-step').style.display === 'block') verifyGrammar();
            else checkTranslation();
        }
    });

    start();
</script>

</body>
</html>
