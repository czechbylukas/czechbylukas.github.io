<script>
// 1. Unified function for click support
function addMultiClickSupport(elementId, url) {
    const btn = document.getElementById(elementId);
    if (!btn) return;

    btn.addEventListener('click', (e) => {
        if (e.button === 0) window.location.href = url;
    });

    btn.addEventListener('auxclick', (e) => {
        if (e.button === 1) {
            window.open(url, '_blank');
            e.preventDefault();
        }
    });
}

// 2. Wait for everything to be ready before checking Admin status
window.addEventListener('load', function() {
    if (typeof firebase !== 'undefined') {
        firebase.auth().onAuthStateChanged(user => {
            // These IDs must match your HTML exactly!
            const adminBtn = document.getElementById('admin-console-btn');
            const toolBtn = document.getElementById('teacher-tool-btn');
            
            if (user && user.email === 'lukas@hackczech.com') {
                console.log("Admin detected: Showing buttons.");
                
                if(adminBtn) {
                    adminBtn.style.display = 'block';
                    addMultiClickSupport('admin-console-btn', '/reports/index.html');
                }
                
            } else {
                console.log("Not an admin or not logged in.");
            }
        });
    } else {
        console.error("Firebase failed to load. Check your internet or script tags.");
    }
});
</script>
